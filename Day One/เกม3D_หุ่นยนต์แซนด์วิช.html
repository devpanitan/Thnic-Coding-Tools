<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>หุ่นยนต์ทำแซนด์วิช 3D — โปรแกรม = ลำดับคำสั่ง</title>
<link rel="icon" type="image/png" href="srru-logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<style>
  :root{--ink:#12151a;--paper:#ffffff;--rule:#c9d0d9;--soft:#f0f3f7;--muted:#59626f;--accent:#2f2a9e;--amber:#a35405;--amber-bg:#fef1d6;--green:#0f7a4a;--green-bg:#e2f5ea;--red:#b0191b;--red-bg:#fde2e2;--hl:#ffee9c;--font:'LINE Seed Sans TH','LINESeedSansTH',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);color:var(--ink);background:var(--paper)}
  #c{position:fixed;inset:0;display:block}
  svg.lucide{width:1em;height:1em;vertical-align:-.15em}
  .hud{position:fixed;inset:0;pointer-events:none;z-index:5;display:flex;flex-direction:column;justify-content:space-between;padding:clamp(12px,2.2vh,20px) clamp(14px,3vw,32px)}
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;pointer-events:auto;background:#fff;border:3px solid var(--ink);border-radius:13px;padding:9px 16px}
  .top img{height:clamp(26px,4vh,40px)}
  h1{font-size:clamp(16px,2.4vh,24px);font-weight:800;display:flex;align-items:center;gap:8px}
  h1 svg{color:var(--accent)}
  .top .tag{color:var(--muted);font-size:clamp(11px,1.5vh,14px);flex:1;min-width:170px}
  .panel{background:#fff;border:3px solid var(--ink);border-radius:13px;pointer-events:auto}
  .prog{position:absolute;top:clamp(76px,11.5vh,110px);left:clamp(14px,3vw,32px);width:min(42vw,300px);max-height:52vh;padding:0;overflow:auto}
  .prog h2{font-size:14px;color:#fff;background:var(--ink);font-weight:700;padding:8px 13px;display:flex;align-items:center;gap:7px;position:sticky;top:0;z-index:1}
  .prog .empty{color:var(--muted);font-size:14px}
  #steps{padding:9px 11px 11px}
  .step{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;padding:6px 9px;border-radius:9px;border:2px solid var(--rule);margin-bottom:5px;background:#fff;transition:.15s}
  .step .no{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .step .sw{width:15px;height:15px;border-radius:4px;flex:none}
  .step.on{border-color:var(--amber);background:var(--amber-bg);box-shadow:inset 4px 0 0 var(--amber)}
  .step .fn{font-family:ui-monospace,Consolas,monospace;font-size:14px;font-weight:600;color:var(--ink)}
  .step.on .fn{color:var(--amber)}
  #goal{font-size:13px;font-weight:600;color:#39414d;background:var(--soft);border-left:5px solid var(--accent);border-radius:0 9px 9px 0;padding:7px 11px;margin:9px 11px 0;line-height:1.7}
  #goal b{color:var(--green)}
  .gsw{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin:0 3px 0 2px}
  #mpick{font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);background:#fff;border:3px solid var(--ink);border-radius:9px;padding:9px 14px;cursor:pointer}
  .fb{position:absolute;top:clamp(76px,12vh,120px);left:50%;transform:translateX(-50%);width:min(90vw,560px);text-align:center;
    background:#fff;border:3px solid var(--ink);border-radius:13px;padding:12px 22px;font-size:clamp(15px,2.2vh,20px);font-weight:700;pointer-events:none;display:none}
  .fb.show{display:block}
  .fb.ok{border-color:var(--green);background:var(--green-bg);color:var(--green)}.fb.no{border-color:var(--red);background:var(--red-bg);color:var(--red)}
  .tray{display:flex;flex-direction:column;gap:10px;pointer-events:auto;align-items:center}
  .ings{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:#fff;border:3px solid var(--ink);border-radius:13px;padding:10px 12px}
  .ing{font-family:inherit;font-size:14px;font-weight:700;padding:9px 13px;border-radius:9px;border:2px solid var(--rule);background:var(--soft);color:#39414d;cursor:pointer;display:flex;align-items:center;gap:7px}
  .ing .sw{width:15px;height:15px;border-radius:4px}
  .ing:hover{border-color:var(--ink);background:#fff}
  .acts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .btn{font-family:inherit;font-size:15px;font-weight:700;padding:10px 20px;border-radius:9px;border:0;cursor:pointer;color:#fff;display:inline-flex;align-items:center;gap:8px;background:var(--ink)}
  .btn.run{background:var(--ink)}
  .btn.step{background:var(--accent)}
  .btn.ghost{background:var(--soft);color:#39414d;border:2px solid var(--rule)}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:3px solid var(--ink);border-radius:13px;padding:14px 24px;font-weight:700;color:var(--muted);pointer-events:none}
  @media(max-width:820px){.top .tag{display:none}h1{font-size:16px}.prog{width:min(60vw,260px);max-height:34vh}}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="loading" id="loading">กำลังโหลดหุ่นยนต์ 3D…</div>
  <div class="hud">
    <div class="top">
      <img src="srru-logo.png" alt="SRRU" onerror="this.style.display='none'">
      <h1><i data-lucide="bot"></i> หุ่นยนต์ทำแซนด์วิช 3D</h1>
      <span class="tag">โปรแกรม = “ลำดับคำสั่ง” — เรียงคำสั่งให้หุ่น กดรัน หุ่นทำตามทีละขั้นเป๊ะ (สลับลำดับ ผลก็ต่าง!) · ลากหมุน · สกอลล์/นิ้วซูม</span>
    </div>
    <div class="panel prog" id="prog">
      <h2><i data-lucide="list-ordered"></i> โปรแกรมของหนู (แต่ละคำสั่ง = 1 บรรทัดของโค้ด)</h2>
      <div id="goal" style="display:none"></div>
      <div id="steps"><div class="empty">ยังไม่มีคำสั่ง — กดวัตถุดิบด้านล่างเพื่อเพิ่มทีละขั้น</div></div>
    </div>
    <div class="fb" id="fb"></div>
    <div class="tray">
      <select id="mpick" onchange="setMission(this.value)">
        <option value="free">โหมด: อิสระ (เล่นเอง)</option>
        <option value="hamcheese">โจทย์: แซนด์วิชแฮม-ชีส</option>
        <option value="veggie">โจทย์: แซนด์วิชผัก</option>
        <option value="deluxe">โจทย์: แซนด์วิชจัดเต็ม</option>
      </select>
      <div class="ings" id="ings"></div>
      <div class="acts">
        <button class="btn run" onclick="run()"><i data-lucide="play"></i> รันทั้งหมด</button>
        <button class="btn step" onclick="stepRun()"><i data-lucide="step-forward"></i> ทำทีละขั้น</button>
        <button class="btn ghost" onclick="undo()"><i data-lucide="undo-2"></i> ลบท้าย</button>
        <button class="btn ghost" onclick="clearProg()"><i data-lucide="trash-2"></i> ล้าง</button>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="importmap">
{ "imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
const $=id=>document.getElementById(id);
const icons=()=>{if(window.lucide)lucide.createIcons();};
const ROBOT_URL='https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/RobotExpressive/RobotExpressive.glb';
const ING={
  breadB:{name:'ขนมปัง (ฐาน)',color:0xE3B778,th:0.34,w:2.9,bread:1},
  ham:   {name:'แฮม',color:0xE8998D,th:0.14,w:2.6},
  cheese:{name:'ชีส',color:0xF2C14E,th:0.12,w:2.55},
  lettuce:{name:'ผักกาด',color:0x7DBE5C,th:0.18,w:2.7},
  tomato:{name:'มะเขือเทศ',color:0xE0503E,th:0.14,w:2.5},
  egg:   {name:'ไข่',color:0xF6E27A,th:0.16,w:2.5},
  breadT:{name:'ขนมปัง (ปิดบน)',color:0xE3B778,th:0.42,w:2.9,bread:1},
};
const FN={breadB:'วางขนมปังฐาน',ham:'วางแฮม',cheese:'วางชีส',lettuce:'วางผักกาด',tomato:'วางมะเขือเทศ',egg:'วางไข่',breadT:'ปิดขนมปังบน'};
const MISSIONS={
  free:{name:'อิสระ (เล่นเอง)',target:null},
  hamcheese:{name:'แซนด์วิชแฮม-ชีส',target:['breadB','ham','cheese','breadT']},
  veggie:{name:'แซนด์วิชผัก',target:['breadB','lettuce','tomato','breadT']},
  deluxe:{name:'แซนด์วิชจัดเต็ม',target:['breadB','ham','cheese','egg','lettuce','tomato','breadT']},
};
let curMission='free',stepIdx=-1;
let actx=null;function playPlop(){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=170+Math.random()*50;g.gain.setValueAtTime(0.11,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.16);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.17);}catch(e){}}
let scene,camera,renderer,controls,robot,mixer,actions={},curAction=null,robotIsModel=false;
let carriers=[],placed=[],puffs=[],program=[],running=false,stackTop=0.22;
const clock=new THREE.Clock();
const hex=c=>'#'+c.toString(16).padStart(6,'0');

function init(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0xffffff);scene.fog=new THREE.Fog(0xffffff,32,100);
  camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,.1,300);camera.position.set(7,6.5,10);
  renderer=new THREE.WebGLRenderer({canvas:$("c"),antialias:true});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0,1.4,0);controls.enableDamping=true;controls.dampingFactor=.08;
  controls.minDistance=5;controls.maxDistance=26;controls.maxPolarAngle=1.45;controls.update();
  scene.add(new THREE.HemisphereLight(0xffffff,0xb8bcc4,.9));
  const d=new THREE.DirectionalLight(0xffffff,.9);d.position.set(7,15,9);d.castShadow=true;d.shadow.mapSize.set(1024,1024);
  d.shadow.camera.left=-14;d.shadow.camera.right=14;d.shadow.camera.top=14;d.shadow.camera.bottom=-14;scene.add(d);
  const grid=new THREE.GridHelper(8000,400,0xb8bfca,0xdfe3ea);grid.material.opacity=.5;grid.material.transparent=true;grid.position.y=0.02;scene.add(grid);
  const sc=new THREE.Mesh(new THREE.PlaneGeometry(400,400),new THREE.ShadowMaterial({opacity:.18}));sc.rotation.x=-Math.PI/2;sc.receiveShadow=true;scene.add(sc);
  const plate=new THREE.Mesh(new THREE.CylinderGeometry(2.4,2.2,0.22,40),new THREE.MeshStandardMaterial({color:0xf3f5f8,roughness:.6}));
  plate.position.y=0.11;plate.receiveShadow=true;plate.castShadow=true;scene.add(plate);
  loadRobot();
  addEventListener('resize',onResize);
  animate();
}
function loadRobot(){
  new GLTFLoader().load(ROBOT_URL, g=>{
    robot=g.scene;robot.scale.set(0.85,0.85,0.85);robot.position.set(-4.4,0,0.6);robot.rotation.y=0.7;
    robot.traverse(o=>{if(o.isMesh){o.castShadow=true;}});
    scene.add(robot);mixer=new THREE.AnimationMixer(robot);robotIsModel=true;
    g.animations.forEach(c=>actions[c.name]=mixer.clipAction(c));
    fadeTo('Idle',true);$("loading").style.display='none';
  }, undefined, ()=>{ makePrimitive();$("loading").style.display='none'; });
}
function makePrimitive(){
  const g=new THREE.Group();const M=(c)=>new THREE.MeshStandardMaterial({color:c,roughness:.5,metalness:.2});
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.7,1.1),M(0x9fb4e6));body.position.y=1.5;body.castShadow=true;g.add(body);
  const head=new THREE.Mesh(new THREE.BoxGeometry(1.2,1,1),M(0xeaf0ff));head.position.y=2.85;head.castShadow=true;g.add(head);
  for(const ex of[-0.27,0.27]){const e=new THREE.Mesh(new THREE.SphereGeometry(0.13,14,14),new THREE.MeshStandardMaterial({color:0x1565C0,emissive:0x1565C0,emissiveIntensity:.4}));e.position.set(ex,2.9,0.5);g.add(e);}
  const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.12,14,14),new THREE.MeshStandardMaterial({color:0xffd24d,emissive:0xffd24d,emissiveIntensity:.6}));bulb.position.set(0,3.7,0);g.add(bulb);
  g.position.set(-4.2,0,0.5);g.rotation.y=0.6;g.userData={bulb,bob:0};scene.add(g);robot=g;robotIsModel=false;
}
function fadeTo(name,loop){const n=actions[name];if(!n||curAction===n)return;
  n.reset().setLoop(loop?THREE.LoopRepeat:THREE.LoopOnce,Infinity);n.clampWhenFinished=!loop;n.fadeIn(0.25).play();
  if(curAction)curAction.fadeOut(0.25);curAction=n;}
function gesture(name){
  if(robotIsModel&&mixer&&actions[name]){fadeTo(name,false);const f=()=>{mixer.removeEventListener('finished',f);fadeTo('Idle',true);};mixer.addEventListener('finished',f);}
  else if(robot&&robot.userData){robot.userData.bob=1;}
}
function roundedRectShape(w,d,r){const s=new THREE.Shape();const x=-w/2,y=-d/2;
  s.moveTo(x+r,y);s.lineTo(x+w-r,y);s.quadraticCurveTo(x+w,y,x+w,y+r);
  s.lineTo(x+w,y+d-r);s.quadraticCurveTo(x+w,y+d,x+w-r,y+d);
  s.lineTo(x+r,y+d);s.quadraticCurveTo(x,y+d,x,y+d-r);
  s.lineTo(x,y+r);s.quadraticCurveTo(x,y,x+r,y);return s;}
function slabMesh(w,d,th,r,color,rough){
  const geo=new THREE.ExtrudeGeometry(roundedRectShape(w,d,r),{depth:th,bevelEnabled:true,bevelThickness:Math.min(th*0.45,0.09),bevelSize:Math.min(r*0.6,0.13),bevelSegments:2,steps:1});
  geo.rotateX(-Math.PI/2);geo.center();
  const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color,roughness:rough||0.7,metalness:0.03}));
  m.castShadow=true;m.receiveShadow=true;return m;}
function makeIngredient(key){const s=ING[key];
  if(key==='tomato'){const g=new THREE.Mesh(new THREE.CylinderGeometry(s.w*0.42,s.w*0.42,s.th,26),new THREE.MeshStandardMaterial({color:s.color,roughness:.45}));g.castShadow=g.receiveShadow=true;return g;}
  if(key==='egg'){const grp=new THREE.Group();const white=slabMesh(s.w*0.88,s.w*0.72,0.08,0.55,0xfdfdf5,0.55);grp.add(white);
    const yolk=new THREE.Mesh(new THREE.SphereGeometry(0.42,20,16),new THREE.MeshStandardMaterial({color:0xF6B93B,roughness:.35}));yolk.scale.y=0.55;yolk.position.y=0.14;yolk.castShadow=true;grp.add(yolk);return grp;}
  if(key==='lettuce'){const m=slabMesh(s.w,s.w*0.82,s.th,0.55,s.color,0.85);
    const p=m.geometry.attributes.position;for(let i=0;i<p.count;i++){const y=p.getY(i);if(y>0.02)p.setY(i,y+(Math.random()-.25)*0.08);}p.needsUpdate=true;m.geometry.computeVertexNormals();return m;}
  const bread=!!s.bread;
  return slabMesh(s.w,s.w*(bread?0.86:0.8),s.th,bread?0.36:0.26,s.color,bread?0.78:0.6);}
const SUPPLY=new THREE.Vector3(-3.3,2.5,1.0); // จุดที่หุ่นหยิบของ (ข้างตัวหุ่น)
function easeIO(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function puff(pos){for(let i=0;i<9;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),new THREE.MeshBasicMaterial({color:0xEFE6D0,transparent:true,opacity:.8}));
  p.position.copy(pos);p.position.y+=0.08;p.userData.v=new THREE.Vector3((Math.random()-.5)*.15,Math.random()*.05+.02,(Math.random()-.5)*.15);scene.add(p);puffs.push(p);}}
function placeIngredient(key){const m=makeIngredient(key);
  m.updateMatrixWorld(true);const box=new THREE.Box3().setFromObject(m);const h=Math.max(box.max.y-box.min.y,0.05);
  const ty=stackTop+h/2;stackTop+=h;
  m.position.copy(SUPPLY);scene.add(m);placed.push(m);
  const end=new THREE.Vector3(0,ty,0);
  const peak=new THREE.Vector3(SUPPLY.x*0.45,Math.max(SUPPLY.y,ty)+2.9,SUPPLY.z*0.45);
  carriers.push({m,t:0,dur:0.9,p0:SUPPLY.clone(),p1:peak,p2:end,sx:(Math.random()-.5)*2.4,sy:(Math.random()-.5)*2.2,restY:(Math.random()-.5)*0.22,done:false});
  gesture('Wave');}
function clearStack(){placed.forEach(m=>scene.remove(m));puffs.forEach(p=>scene.remove(p));placed=[];carriers=[];puffs=[];stackTop=0.22;}

function goalBox(){const g=$("goal");if(!g)return;const t=MISSIONS[curMission].target;
  if(!t){g.style.display='none';return;}
  g.style.display='block';
  g.innerHTML='<b>เป้าหมาย:</b> '+t.map(k=>'<span class="gsw" style="background:'+hex(ING[k].color)+'"></span>'+ING[k].name.replace(' (ฐาน)','').replace(' (ปิดบน)','บน').replace('ขนมปังบน','ปิดบน')).join(' → ');}
function renderSteps(cur){const el=$("steps");goalBox();
  if(!program.length){el.innerHTML='<div class="empty">ยังไม่มีคำสั่ง — กดวัตถุดิบด้านล่างเพื่อเพิ่มทีละขั้น</div>';return;}
  el.innerHTML=program.map((k,i)=>{const s=ING[k];
    return '<div class="step'+(i===cur?' on':'')+'"><span class="no">'+(i+1)+'</span><span class="sw" style="background:'+hex(s.color)+'"></span><span class="fn">'+FN[k]+'();</span></div>';}).join('');}
function resetStepIfNeeded(){if(stepIdx>=0){stepIdx=-1;clearStack();}}
function addCmd(k){if(running)return;resetStepIfNeeded();program.push(k);renderSteps(-1);hideFb();}
function undo(){if(running)return;resetStepIfNeeded();program.pop();renderSteps(-1);hideFb();}
function clearProg(){if(running)return;stepIdx=-1;program=[];renderSteps(-1);clearStack();hideFb();}
function setMission(v){curMission=v;stepIdx=-1;program=[];clearStack();hideFb();renderSteps(-1);}
function stepRun(){
  if(running)return;
  if(!program.length){showFb('ยังไม่มีคำสั่ง — เพิ่มวัตถุดิบก่อนนะ','no');return;}
  if(stepIdx<0){clearStack();hideFb();stepIdx=0;}
  if(stepIdx<program.length){renderSteps(stepIdx);placeIngredient(program[stepIdx]);stepIdx++;
    if(stepIdx>=program.length){setTimeout(()=>{if(stepIdx>=program.length){renderSteps(-1);evaluate();stepIdx=-1;}},1000);}
  }
}
function hideFb(){$("fb").className="fb";}
function showFb(msg,cls){const f=$("fb");f.className="fb show "+cls;f.innerHTML=msg;icons();}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
async function run(){
  if(running)return;if(!program.length){showFb('ยังไม่มีคำสั่ง — เพิ่มวัตถุดิบก่อนนะ','no');return;}
  running=true;stepIdx=-1;clearStack();hideFb();await wait(400);
  for(let i=0;i<program.length;i++){renderSteps(i);placeIngredient(program[i]);await wait(1050);}
  renderSteps(-1);evaluate();running=false;
}
function evaluate(){
  const tgt=MISSIONS[curMission].target;
  if(tgt){
    const ok=program.length===tgt.length&&program.every((k,i)=>k===tgt[i]);
    if(ok){showFb('<i data-lucide="party-popper"></i> ตรงสูตรเป๊ะ! หุ่นทำตาม “ลำดับ” ที่หนูเขียนได้ถูกต้อง','ok');if(robotIsModel)fadeTo('Dance',true);}
    else{showFb('<i data-lucide="alert-triangle"></i> ยังไม่ตรงสูตรเป้าหมาย — เทียบ “ลำดับ” กับเป้าหมาย (ซ้ายบน) แล้วจัดใหม่','no');if(robotIsModel)gesture('No');}
    return;
  }
  const first=program[0],last=program[program.length-1];
  const fills=program.slice(1,-1).filter(k=>!ING[k].bread).length;
  const bottomOk=first==='breadB',topOk=last==='breadT';
  if(bottomOk&&topOk&&fills>=1){showFb('<i data-lucide="party-popper"></i> แซนด์วิชสมบูรณ์! หุ่นทำตาม “ลำดับ” ที่หนูเขียนเป๊ะ ๆ','ok');if(robotIsModel)fadeTo('Dance',true);}
  else{let why=[];
    if(!bottomOk)why.push('ยังไม่ได้เริ่มด้วย <b>ขนมปัง (ฐาน)</b>');
    if(!topOk)why.push('ยังไม่ได้ <b>ปิดด้วยขนมปังบน</b> เป็นคำสั่งสุดท้าย');
    if(fills<1)why.push('ยังไม่มี <b>ไส้</b> ระหว่างขนมปัง');
    showFb('<i data-lucide="alert-triangle"></i> หุ่นทำตามที่สั่งเป๊ะ แต่ยังไม่ใช่แซนด์วิชที่ดี:<br>'+why.join(' · ')+'<br><span style="font-weight:400">→ ลอง<b>จัดลำดับคำสั่งใหม่</b> (ฐาน → ไส้ → ปิดบน)</span>','no');
    if(robotIsModel)gesture('No');}
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
let ph=0;
function animate(){
  requestAnimationFrame(animate);ph+=0.02;const dt=clock.getDelta();
  if(mixer)mixer.update(dt);
  controls.update();
  carriers=carriers.filter(c=>{c.t=Math.min(1,c.t+dt/c.dur);const t=easeIO(c.t),u=1-t;
    c.m.position.set(u*u*c.p0.x+2*u*t*c.p1.x+t*t*c.p2.x, u*u*c.p0.y+2*u*t*c.p1.y+t*t*c.p2.y, u*u*c.p0.z+2*u*t*c.p1.z+t*t*c.p2.z);
    c.m.rotation.set(c.sx*u, c.restY*t+c.sy*u*Math.PI, 0); // ตีลังกากลางอากาศ → ลงราบ
    if(c.t>=1&&!c.done){c.done=true;c.m.userData.squash=0.34;puff(c.p2);playPlop();}
    return c.t<1;});
  placed.forEach(m=>{const sq=m.userData.squash||0;if(sq>0.004){m.userData.squash=sq*0.8;m.scale.set(1+sq*0.4,1-sq,1+sq*0.4);}else if(m.scale.y!==1)m.scale.set(1,1,1);});
  puffs=puffs.filter(p=>{p.position.add(p.userData.v);p.userData.v.y-=0.006;p.material.opacity*=0.9;p.scale.multiplyScalar(0.96);if(p.material.opacity<0.05){scene.remove(p);return false;}return true;});
  if(robot&&!robotIsModel&&robot.userData){robot.userData.bob=Math.max(0,robot.userData.bob-0.04);robot.position.y=Math.sin(robot.userData.bob*Math.PI)*0.25;if(robot.userData.bulb)robot.userData.bulb.material.emissiveIntensity=0.5+robot.userData.bob*0.6;}
  renderer.render(scene,camera);
}
$("ings").innerHTML=Object.keys(ING).map(k=>'<button class="ing" onclick="addCmd(\''+k+'\')"><span class="sw" style="background:'+hex(ING[k].color)+'"></span>'+ING[k].name+'</button>').join('');
window.addCmd=addCmd;window.undo=undo;window.clearProg=clearProg;window.run=run;window.stepRun=stepRun;window.setMission=setMission;
init();renderSteps(-1);icons();
</script>
