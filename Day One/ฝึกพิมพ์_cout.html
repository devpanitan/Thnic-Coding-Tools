:root{
  --ink:#12151a;
  --paper:#ffffff;
  --rule:#c9d0d9;
  --soft:#f0f3f7;
  --accent:#2f2a9e;
  --amber:#a35405;
  --amber-bg:#fef1d6;
  --green:#0f7a4a;
  --red:#b0191b;
  --font:'LINE Seed Sans TH','LINESeedSansTH',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
body{background:var(--paper); color:var(--ink); font-size:20px; line-height:1.5}

.ic{width:1em;height:1em;flex:0 0 auto;vertical-align:-.12em;stroke-width:2.2}

/* ---------- หัว ---------- */
header{
  border-bottom:4px solid var(--ink);
  padding:13px 26px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
}
h1{font-size:26px; font-weight:800; letter-spacing:-.01em; white-space:nowrap;
   display:flex; align-items:center; gap:9px}
h1 .ic{font-size:27px; color:var(--accent); stroke-width:2.4}

.rail{display:flex; gap:8px; flex:1; min-width:280px}
.rail button{
  font:inherit; font-size:17px; font-weight:700;
  background:var(--soft); color:#59626f;
  border:2px solid transparent; border-radius:9px;
  padding:7px 16px; cursor:pointer; white-space:nowrap; text-align:left;
}
.rail button small{display:block; font-size:13px; font-weight:400; opacity:.85}
.rail button[aria-selected="true"]{background:var(--ink); color:#fff; border-color:var(--ink)}
.rail button:focus-visible{outline:3px solid var(--accent); outline-offset:2px}

/* ---------- นาฬิกาสลับคน ---------- */
.swap{
  display:flex; align-items:center; gap:10px;
  border:3px solid var(--ink); border-radius:11px;
  padding:6px 12px; font-weight:700;
}
.swap > .ic{font-size:22px}
.swap.alert{background:var(--amber-bg); border-color:var(--amber); color:var(--amber)}
.swap__t{font-size:26px; font-weight:800; min-width:80px; text-align:center; letter-spacing:.02em}
.swap button{
  font:inherit; font-size:15px; font-weight:700;
  border:2px solid currentColor; background:transparent; color:inherit;
  border-radius:7px; padding:4px 12px; cursor:pointer;
  display:inline-flex; align-items:center; gap:5px;
}
.swap button:focus-visible{outline:3px solid var(--accent); outline-offset:2px}

/* ---------- เนื้อ ---------- */
main{padding:22px 26px 92px; max-width:1520px; margin:0 auto}
.task__no{
  display:inline-block; background:var(--accent); color:#fff;
  font-weight:700; font-size:17px; padding:3px 15px; border-radius:99px; margin-bottom:10px;
}
.task__title{font-size:33px; font-weight:800; line-height:1.18; margin-bottom:6px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.task__title .ic{font-size:30px; color:var(--amber); fill:var(--amber)}
.task__do{font-size:22px; color:#39414d; margin-bottom:18px}
.task__do b{background:#ffee9c; padding:0 4px; color:var(--ink); font-weight:700}

.grid{display:grid; grid-template-columns:1.15fr .85fr; gap:22px; align-items:start}
@media (max-width:1100px){.grid{grid-template-columns:1fr}}

.panel{border:3px solid var(--ink); border-radius:13px; overflow:hidden}
.panel + .panel{margin-top:16px}
.panel__h{
  background:var(--ink); color:#fff;
  font-size:16px; font-weight:700; letter-spacing:.02em;
  padding:8px 15px; display:flex; align-items:center; gap:8px;
}
.panel__h .ic{font-size:18px}
.panel__h .r{margin-left:auto; font-weight:400; opacity:.75; font-size:14px}
.panel__b{padding:16px 18px}

pre{font-size:27px; line-height:1.5; white-space:pre-wrap; word-break:break-word;
    font-variant-ligatures:none}
pre .kw{color:var(--accent); font-weight:800}
pre .str{color:var(--green); font-weight:700}
pre .num{color:var(--amber); font-weight:700}
pre .cm{color:#78838f}
pre .fill{background:#ffee9c; padding:0 4px; border-radius:3px}
pre .bad{background:#fde2e2; box-shadow:0 3px 0 var(--red); padding:0 3px}

.out{background:#12151a; color:#e9eef5; border-radius:9px; padding:13px 16px; font-size:24px}
.out--err{background:#2b0e0f; color:#ffb7b7; font-size:19px; line-height:1.5}

ul.hint{list-style:none}
ul.hint li{display:flex; gap:8px; margin-bottom:10px; font-size:19px}
ul.hint li .ic{font-size:19px; color:var(--accent); margin-top:.25em}
ul.hint b{background:#ffee9c; padding:0 3px; font-weight:700}

.warn{
  display:flex; gap:9px; align-items:flex-start;
  background:var(--amber-bg); border-left:6px solid var(--amber);
  padding:12px 15px; font-size:19px; margin-top:14px; border-radius:0 9px 9px 0;
}
.warn .ic{font-size:21px; color:var(--amber); margin-top:.15em}
.warn b{color:var(--amber); font-weight:700}

.answer[hidden]{display:none}
.reveal{
  font:inherit; font-size:18px; font-weight:700;
  background:#fff; color:var(--ink); border:3px solid var(--ink);
  border-radius:9px; padding:8px 18px; cursor:pointer;
  display:inline-flex; align-items:center; gap:7px;
}
.reveal:hover{background:var(--ink); color:#fff}
.reveal:focus-visible{outline:3px solid var(--accent); outline-offset:2px}

/* ---------- แถบล่าง ---------- */
.foot{
  position:fixed; left:0; right:0; bottom:0;
  background:var(--ink); color:#fff; padding:10px 26px;
  display:flex; align-items:center; gap:18px; flex-wrap:wrap; font-size:17px;
}
.foot .rules{flex:1; min-width:250px; color:#bcc5d1; display:flex; align-items:center; gap:8px}
.foot .rules .ic{font-size:19px; color:#ffd977}
.foot .rules b{color:#ffd977; font-weight:700}
.nav{display:flex; align-items:center; gap:10px}
.nav button{
  font:inherit; font-size:18px; font-weight:700;
  background:#fff; color:var(--ink); border:0; border-radius:9px;
  padding:8px 17px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
}
.nav button:disabled{opacity:.32; cursor:default}
.nav button:focus-visible{outline:3px solid #7cc4ff; outline-offset:2px}
.nav .pos{min-width:64px; text-align:center; font-weight:800}

@media (prefers-reduced-motion:no-preference){ .swap.alert{animation:pulse 1s ease-in-out infinite} }
@keyframes pulse{50%{background:#fde2a8}}
</style>
</head>
<body>

<header>
  <h1><svg class="ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M10 8h.01" /> <path d="M12 12h.01" /> <path d="M14 8h.01" /> <path d="M16 12h.01" /> <path d="M18 8h.01" /> <path d="M6 8h.01" /> <path d="M7 16h10" /> <path d="M8 12h.01" /> <rect width="20" height="16" x="2" y="4" rx="2" /> </svg>ฝึกพิมพ์ cout</h1>
  <div class="rail" role="tablist">
    <button role="tab" aria-selected="true" data-block="0">ก้อน 1 · พิมพ์ตาม<small>12 นาที</small></button>
    <button role="tab" aria-selected="false" data-block="1">ก้อน 2 · แก้โค้ด<small>18 นาที</small></button>
    <button role="tab" aria-selected="false" data-block="2">ก้อน 3 · เขียนเอง<small>18 นาที</small></button>
  </div>
  <div class="swap" id="swap">
    <svg class="ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="m17 2 4 4-4 4" /> <path d="M3 11v-1a4 4 0 0 1 4-4h14" /> <path d="m7 22-4-4 4-4" /> <path d="M21 13v1a4 4 0 0 1-4 4H3" /> </svg>
    <span>สลับคนพิมพ์ใน</span>
    <span class="swap__t" id="swapT">10:00</span>
    <button id="swapBtn"><svg class="ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" /> </svg><span id="swapLbl">เริ่ม</span></button>
  </div>
</header>

<main id="stage"></main>

<div class="foot">
  <div class="rules">
    <svg class="ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M18 21a8 8 0 0 0-16 0" /> <circle cx="10" cy="8" r="5" /> <path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3" /> </svg>
    <span><b>คนพิมพ์</b> จับคีย์บอร์ดอย่างเดียว · <b>คนคุม</b> อ่านโจทย์ + ทำใบฝึกกระดาษ · <b>error ไม่ใช่ความผิด</b> เจออันแปลกเอามาโชว์ได้คะแนน</span>
  </div>
  <div class="nav">
    <button id="prev"><svg class="ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="m12 19-7-7 7-7" /> <path d="M19 12H5" /> </svg>ก่อนหน้า</button>
    <span class="pos" id="pos">1/3</span>
    <button id="next">ถัดไป<svg class="ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" > <path d="M5 12h14" /> <path d="m12 5 7 7-7 7" /> </svg></button>
  </div>
</div>

<script>
const IC = {"keyboard": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M10 8h.01\" /> <path d=\"M12 12h.01\" /> <path d=\"M14 8h.01\" /> <path d=\"M16 12h.01\" /> <path d=\"M18 8h.01\" /> <path d=\"M6 8h.01\" /> <path d=\"M7 16h10\" /> <path d=\"M8 12h.01\" /> <rect width=\"20\" height=\"16\" x=\"2\" y=\"4\" rx=\"2\" /> </svg>", "repeat": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"m17 2 4 4-4 4\" /> <path d=\"M3 11v-1a4 4 0 0 1 4-4h14\" /> <path d=\"m7 22-4-4 4-4\" /> <path d=\"M21 13v1a4 4 0 0 1-4 4H3\" /> </svg>", "rotate-ccw": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8\" /> <path d=\"M3 3v5h5\" /> </svg>", "code-xml": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"m18 16 4-4-4-4\" /> <path d=\"m6 8-4 4 4 4\" /> <path d=\"m14.5 4-5 16\" /> </svg>", "monitor": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <rect width=\"20\" height=\"14\" x=\"2\" y=\"3\" rx=\"2\" /> <line x1=\"8\" x2=\"16\" y1=\"21\" y2=\"21\" /> <line x1=\"12\" x2=\"12\" y1=\"17\" y2=\"21\" /> </svg>", "triangle-alert": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3\" /> <path d=\"M12 9v4\" /> <path d=\"M12 17h.01\" /> </svg>", "lightbulb": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5\" /> <path d=\"M9 18h6\" /> <path d=\"M10 22h4\" /> </svg>", "key-round": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z\" /> <circle cx=\"16.5\" cy=\"7.5\" r=\".5\" fill=\"currentColor\" /> </svg>", "chevron-right": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"m9 18 6-6-6-6\" /> </svg>", "arrow-left": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"m12 19-7-7 7-7\" /> <path d=\"M19 12H5\" /> </svg>", "arrow-right": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M5 12h14\" /> <path d=\"m12 5 7 7-7 7\" /> </svg>", "users-round": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M18 21a8 8 0 0 0-16 0\" /> <circle cx=\"10\" cy=\"8\" r=\"5\" /> <path d=\"M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3\" /> </svg>", "star": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z\" /> </svg>", "play": "<svg class=\"ic\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" > <path d=\"M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z\" /> </svg>"};
const BLOCKS = [[{"no": "ข้อ 1.1", "title": "โปรแกรมแรกของเธอ", "do": "พิมพ์ตามให้เหมือนทุกตัวอักษร แล้วกด Run ให้ขึ้นคำว่า <b>Hello</b>", "code": "<span class=\"kw\">#include</span> &lt;iostream&gt;\n<span class=\"kw\">using namespace</span> std;\n\n<span class=\"kw\">int</span> main() {\n    cout &lt;&lt; <span class=\"str\">\"Hello\"</span>;\n    <span class=\"kw\">return</span> <span class=\"num\">0</span>;\n}", "out": "Hello", "hints": ["ยังไม่ต้องเข้าใจทุกบรรทัด ตอนนี้ขอแค่<b>รันให้ได้ก่อน</b>", "<b>4 บรรทัดบนกับล่างเหมือนกันทุกโปรแกรม</b> พิมพ์ครั้งเดียวแล้วใช้ยาวทั้งค่าย", "ถ้าไม่ขึ้น ให้ดู 3 อย่าง — ลืม <b>;</b> · ลืม <b>\"</b> · ลืม <b>}</b>"], "warn": "เครื่องหมายทุกตัวต้องเป็น<b>ภาษาอังกฤษ</b> ถ้าสลับเป็นไทยค้างไว้ เครื่องหมายคำพูดจะกลายเป็นตัวอักษรไทยแล้วรันไม่ผ่าน"}, {"no": "ข้อ 1.2", "title": "ใส่ชื่อทีมของตัวเอง", "do": "เปลี่ยนเป็นชื่อทีมที่ตั้งกันไว้ตอนเช้า และเพิ่ม <b>endl</b> เพื่อขึ้นบรรทัดใหม่", "code": "<span class=\"kw\">int</span> main() {\n    cout &lt;&lt; <span class=\"str\">\"ทีม <span class=\"fill\">.........</span>\"</span> &lt;&lt; endl;\n    cout &lt;&lt; <span class=\"str\">\"พร้อมลุยแล้ว\"</span> &lt;&lt; endl;\n    <span class=\"kw\">return</span> <span class=\"num\">0</span>;\n}", "out": "ทีมเสือ\nพร้อมลุยแล้ว", "hints": ["<b>endl</b> = จบบรรทัด ขึ้นบรรทัดใหม่ · ลองลบออกดูว่าต่างกันยังไง", "<b>endl ไม่ต้องใส่เครื่องหมายคำพูด</b> เพราะไม่ใช่ข้อความ เป็นคำสั่ง"]}, {"no": "ข้อ 1.3", "title": "เก็บใส่ตัวแปรก่อนค่อยแสดง", "do": "ประกาศตัวแปร 2 ตัว แล้ว cout <b>ชื่อตัวแปร</b> ไม่ใช่ค่าโดยตรง", "code": "<span class=\"kw\">int</span> main() {\n    <span class=\"kw\">string</span> team = <span class=\"str\">\"<span class=\"fill\">.......</span>\"</span>;\n    <span class=\"kw\">int</span> members = <span class=\"num\">11</span>;\n\n    cout &lt;&lt; team &lt;&lt; endl;\n    cout &lt;&lt; members &lt;&lt; endl;\n    <span class=\"kw\">return</span> <span class=\"num\">0</span>;\n}", "out": "เสือ\n11", "hints": ["สังเกต — <b>team ไม่มีเครื่ let bi = 0, ti = 0;
const stage = document.getElementById('stage');

function render(){
  const t = BLOCKS[bi][ti];
  let right = '';

  if(t.out) right += `<div class="panel"><div class="panel__h">${IC['monitor']}ผลลัพธ์ที่ควรได้</div>
    <div class="panel__b"><div class="out">${t.out.replace(/\n/g,'<br>')}</div></div></div>`;

  if(t.err) right += `<div class="panel"><div class="panel__h">${IC['triangle-alert']}error ที่จะเจอ</div>
    <div class="panel__b"><div class="out out--err">${t.err.replace(/\n/g,'<br>')}</div></div></div>`;

  if(t.answer) right += `<div class="panel"><div class="panel__h">${IC['key-round']}เฉลย</div>
    <div class="panel__b">
      <button class="reveal" id="rev">${IC['key-round']}<span id="revLbl">แสดงเฉลย</span></button>
      <pre class="answer" id="ans" hidden style="font-size:22px;margin-top:13px">${t.answer}</pre>
    </div></div>`;

  if(t.hints) right += `<div class="panel"><div class="panel__h">${IC['lightbulb']}ครูชวนคิด</div>
    <div class="panel__b"><ul class="hint">${t.hints.map(h=>`<li>${IC['chevron-right']}<span>${h}</span></li>`).join('')}</ul>
    ${t.warn ? `<div class="warn">${IC['triangle-alert']}<span>${t.warn}</span></div>` : ''}</div></div>`;

  stage.innerHTML = `
    <span class="task__no">${t.no}</span>
    <h2 class="task__title">${t.star ? IC['star'] : ''}${t.title}</h2>
    <p class="task__do">${t.do}</p>
    <div class="grid">
      <div class="panel"><div class="panel__h">${IC['code-xml']}พิมพ์ตามนี้<span class="r">OneCompiler</span></div>
        <div class="panel__b"><pre>${t.code}</pre></div></div>
      <div>${right}</div>
    </div>`;

  const rev = document.getElementById('rev');
  if(rev) rev.onclick = () => {
    const a = document.getElementById('ans');
    a.hidden = !a.hidden;
    document.getElementById('revLbl').textContent = a.hidden ? 'แสดงเฉลย' : 'ซ่อนเฉลย';
  };

  document.getElementById('pos').textContent = (ti+1) + '/' + BLOCKS[bi].length;
  document.getElementById('prev').disabled = (ti === 0);
  document.getElementById('next').disabled = (ti === BLOCKS[bi].length - 1);
  document.querySelectorAll('.rail button').forEach((b,i) => b.setAttribute('aria-selected', i === bi));
}

document.querySelectorAll('.rail button').forEach(b => {
  b.onclick = () => { bi = +b.dataset.block; ti = 0; render(); };
});
document.getElementById('prev').onclick = () => { if(ti>0){ti--;render();} };
document.getElementById('next').onclick = () => { if(ti<BLOCKS[bi].length-1){ti++;render();} };
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') document.getElementById('next').click();
  if(e.key === 'ArrowLeft')  document.getElementById('prev').click();
});

/* นาฬิกาสลับคนพิมพ์ */
const SWAP = 600;
let left = SWAP, timer = null;
const box  = document.getElementById('swap'),
      disp = document.getElementById('swapT'),
      btn  = document.getElementById('swapBtn');

function show(){
  disp.textContent = String(Math.floor(left/60)).padStart(2,'0') + ':' + String(left%60).padStart(2,'0');
}
function setBtn(icon, text){ btn.innerHTML = IC[icon] + '<span>' + text + '</span>'; }

function stop(){
  if(timer){ clearInterval(timer); timer = null; }
  box.classList.remove('alert');
  left = SWAP; show();
  setBtn('play', 'เริ่ม');
}
function tick(){
  left--;
  if(left > 0){ show(); return; }
  clearInterval(timer); timer = null;
  box.classList.add('alert');
  disp.textContent = 'สลับ!';
  setBtn('play', 'เริ่มรอบใหม่');
  left = SWAP;
}
btn.addEventListener('click', () => {
  if(timer){ stop(); return; }
  box.classList.remove('alert');
  setBtn('rotate-ccw', 'รีเซ็ต');
  timer = setInterval(tick, 1000);
});

show();
render();
</script>
