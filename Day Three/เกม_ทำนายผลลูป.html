<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SRRU | เกมแข่งทำนายผลลูป</title>
<link rel="icon" type="image/png" href="../Day One/srru-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<style>
  :root{--blue:#2f7bf6;--purple:#7a5cff;--green:#19b877;--coral:#ff6a3d;--gold:#f2a900;--ink:#16224a;--muted:#5d6b8a;--line:#dbe6f7;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"LINE Seed Sans TH","Sarabun","Tahoma",system-ui,sans-serif;color:var(--ink);height:100vh;overflow:hidden;
    background:radial-gradient(900px 500px at 10% -10%,#d4e6ff 0,transparent 60%),radial-gradient(800px 500px at 100% 0,#ffe6f7 0,transparent 55%),linear-gradient(160deg,#eef4ff,#fdf3fb);
    display:flex;flex-direction:column;gap:clamp(8px,1.6vh,14px);padding:clamp(12px,2.2vh,22px) clamp(14px,3.5vw,36px)}
  svg.lucide{width:1em;height:1em;vertical-align:-.15em}
  .head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .head img{height:clamp(30px,4.2vh,42px)}
  h1{font-size:clamp(17px,2.5vh,25px);font-weight:700}
  .head .tag{color:var(--muted);font-size:clamp(12px,1.5vh,15px);flex:1;min-width:180px}
  .scorebar{display:flex;align-items:stretch;gap:12px}
  .team{flex:1;background:#fff;border:3px solid var(--line);border-radius:16px;padding:9px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 20px rgba(31,43,72,.07);transition:.2s}
  .team .nm{font-weight:700;font-size:clamp(15px,2vh,19px);display:flex;align-items:center;gap:8px}
  .team .sc{font-family:ui-monospace,monospace;font-weight:700;font-size:clamp(24px,4vh,40px)}
  .team.A{border-color:#bcd3fb}.team.A .sc{color:var(--blue)}
  .team.B{border-color:#ffd9cc}.team.B .sc{color:var(--coral)}
  .team.turn{box-shadow:0 0 0 4px rgba(47,123,246,.18),0 8px 20px rgba(31,43,72,.1);transform:translateY(-2px)}
  .team.B.turn{box-shadow:0 0 0 4px rgba(255,106,61,.2),0 8px 20px rgba(31,43,72,.1)}
  .turnpill{align-self:center;font-size:clamp(12px,1.6vh,15px);font-weight:700;color:#fff;padding:7px 14px;border-radius:99px;background:linear-gradient(135deg,var(--blue),var(--purple));white-space:nowrap}
  .main{flex:1;min-height:0;display:flex;flex-direction:column;gap:clamp(8px,1.4vh,14px)}
  .qcard{flex:1;min-height:0;background:#fff;border:2px solid var(--line);border-radius:18px;box-shadow:0 10px 26px rgba(31,43,72,.08);padding:clamp(12px,2.2vh,22px);display:flex;flex-direction:column;gap:clamp(8px,1.4vh,14px)}
  .qcard .ask{font-size:clamp(15px,2.1vh,19px);font-weight:700;display:flex;align-items:center;gap:9px}
  .code{flex:none;background:#11203a;border-radius:14px;padding:clamp(12px,2.2vh,22px);font-family:ui-monospace,"Consolas",monospace;font-size:clamp(15px,2.5vh,22px);line-height:1.6;color:#e8eefc;white-space:pre;overflow:auto}
  .code .k{color:#ff9bd0}.code .s{color:#ffd27f}.code .c{color:#7fd1ff}.code .m{color:#9ad27f}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,1.4vh,14px)}
  .opt{font-family:ui-monospace,monospace;font-size:clamp(16px,2.6vh,24px);font-weight:700;padding:clamp(10px,1.8vh,18px);border:3px solid var(--line);border-radius:14px;background:#f7faff;color:var(--ink);cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--blue);background:#eef4ff}
  .opt.right{border-color:var(--green);background:#e7f8f0;color:#0d7a4f}
  .opt.wrong{border-color:var(--coral);background:#ffeee8;color:#c0431d}
  .opt:disabled{cursor:default}
  .foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .foot .prog{font-size:15px;color:var(--muted);font-weight:700}
  .foot button{margin-left:auto;font-family:inherit;font-size:15px;font-weight:700;padding:9px 18px;border-radius:11px;border:2px solid var(--line);background:#f0f3fa;color:#2f4a7d;cursor:pointer}
  .fb{font-size:clamp(13px,1.8vh,16px);font-weight:700;min-height:1.4em}
  .fb.ok{color:var(--green)}.fb.no{color:var(--coral)}
  .mascot{position:fixed;right:clamp(8px,1.8vw,24px);bottom:clamp(6px,1.4vh,14px);width:clamp(66px,9vh,96px);height:auto;z-index:6;transform-origin:center bottom;animation:dance 1.5s ease-in-out infinite;filter:drop-shadow(0 6px 10px rgba(0,0,0,.15))}
  @keyframes dance{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-9px) rotate(5deg)}}
  .mascot .armL,.mascot .armR{transform-box:fill-box;transform-origin:center top}
  .mascot .armL{animation:dL .6s ease-in-out infinite}.mascot .armR{animation:dR .6s ease-in-out infinite}
  @keyframes dL{0%,100%{transform:rotate(-30deg)}50%{transform:rotate(24deg)}}
  @keyframes dR{0%,100%{transform:rotate(30deg)}50%{transform:rotate(-24deg)}}
  .mascot.cheer{animation:mcheer .8s ease}
  @keyframes mcheer{0%{transform:translateY(0)}30%{transform:translateY(-26px) scale(1.1)}60%{transform:translateY(0)}80%{transform:translateY(-10px)}100%{transform:translateY(0)}}
  .overlay{position:fixed;inset:0;background:rgba(13,21,48,.55);display:none;align-items:center;justify-content:center;z-index:20}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:22px;padding:34px 44px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.3);max-width:90vw}
  .modal h2{font-size:30px;margin-bottom:6px}
  .modal p{font-size:19px;color:var(--muted);margin-bottom:18px}
  .modal button{font-family:inherit;font-size:17px;font-weight:700;padding:12px 26px;border-radius:13px;border:0;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;cursor:pointer}
</style>
</head>
<body>
  <div class="head">
    <img src="../Day One/srru-logo.png" alt="SRRU" onerror="this.style.display='none'">
    <h1>เกมแข่งทำนายผลลูป</h1>
    <span class="tag">อ่านโค้ดลูป แล้วทายว่าพิมพ์อะไร — ผลัดกันตอบทีละทีม ตอบถูกได้คะแนน</span>
  </div>

  <div class="scorebar">
    <div class="team A turn" id="teamA"><span class="nm"><i data-lucide="users"></i> ทีม A</span><span class="sc" id="scA">0</span></div>
    <div class="turnpill" id="turn">ตาทีม A</div>
    <div class="team B" id="teamB"><span class="nm"><i data-lucide="users"></i> ทีม B</span><span class="sc" id="scB">0</span></div>
  </div>

  <div class="main">
    <div class="qcard">
      <div class="ask"><i data-lucide="terminal"></i> โค้ดนี้พิมพ์อะไรออกหน้าจอ?</div>
      <div class="code" id="code"></div>
      <div class="opts" id="opts"></div>
      <div class="fb" id="fb"></div>
    </div>
    <div class="foot">
      <span class="prog" id="prog">ข้อ 1</span>
      <button onclick="resetGame()"><i data-lucide="rotate-ccw"></i> เริ่มใหม่</button>
    </div>
  </div>

  <svg class="mascot" id="mascot" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <line x1="110" y1="20" x2="110" y2="42" stroke="#7a5cff" stroke-width="5"/><circle cx="110" cy="15" r="9" fill="#ffd24d" stroke="#7a5cff" stroke-width="3"/>
    <g class="armL"><rect x="24" y="120" width="20" height="52" rx="10" fill="#cbd6f5" stroke="#7a5cff" stroke-width="3"/><circle cx="34" cy="176" r="12" fill="#fff" stroke="#7a5cff" stroke-width="3"/></g>
    <g class="armR"><rect x="176" y="120" width="20" height="52" rx="10" fill="#cbd6f5" stroke="#7a5cff" stroke-width="3"/><circle cx="186" cy="176" r="12" fill="#fff" stroke="#7a5cff" stroke-width="3"/></g>
    <rect x="48" y="42" width="124" height="96" rx="28" fill="#eef2ff" stroke="#7a5cff" stroke-width="5"/>
    <ellipse cx="74" cy="104" rx="11" ry="7" fill="#ffb3c1" opacity=".8"/><ellipse cx="146" cy="104" rx="11" ry="7" fill="#ffb3c1" opacity=".8"/>
    <circle cx="88" cy="84" r="15" fill="#fff" stroke="#7a5cff" stroke-width="3"/><circle cx="88" cy="84" r="7" fill="#2f7bf6"/>
    <circle cx="132" cy="84" r="15" fill="#fff" stroke="#7a5cff" stroke-width="3"/><circle cx="132" cy="84" r="7" fill="#2f7bf6"/>
    <rect x="88" y="110" width="44" height="16" rx="8" fill="#19b877"/>
    <rect x="64" y="148" width="92" height="58" rx="16" fill="#fff" stroke="#7a5cff" stroke-width="4"/><rect x="80" y="164" width="60" height="28" rx="8" fill="#e6f0ff"/><path d="M80 178 H140 M98 168 V188" stroke="#2f7bf6" stroke-width="3"/>
  </svg>

  <div class="overlay" id="overlay"><div class="modal">
    <h2 id="winTitle">จบเกม!</h2>
    <p id="winSub"></p>
    <button onclick="resetGame()"><i data-lucide="rotate-ccw"></i> เล่นอีกครั้ง</button>
  </div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const icons=()=>{if(window.lucide)lucide.createIcons();};

// แต่ละข้อ: code(html), choices[], correct(index), hint
const QS=[
 {code:`<span class="k">for</span> (<span class="k">int</span> i = <span class="m">1</span>; i &lt;= <span class="m">3</span>; i++)\n    cout &lt;&lt; i &lt;&lt; <span class="s">" "</span>;`,
  ch:["1 2 3","1 2 3 4","0 1 2","3 2 1"],c:0,hint:"i เริ่ม 1 ถึง 3 พิมพ์ทีละตัว"},
 {code:`<span class="k">for</span> (<span class="k">int</span> i = <span class="m">0</span>; i &lt; <span class="m">3</span>; i++)\n    cout &lt;&lt; <span class="s">"*"</span>;`,
  ch:["**","***","****","*"],c:1,hint:"i = 0,1,2 รวม 3 รอบ พิมพ์ดาว 3 ตัว"},
 {code:`<span class="k">for</span> (<span class="k">int</span> i = <span class="m">2</span>; i &lt;= <span class="m">8</span>; i += <span class="m">2</span>)\n    cout &lt;&lt; i &lt;&lt; <span class="s">" "</span>;`,
  ch:["2 4 6 8","1 2 3 4","2 3 4 5","2 4 6"],c:0,hint:"i เพิ่มทีละ 2: 2,4,6,8"},
 {code:`<span class="k">for</span> (<span class="k">int</span> i = <span class="m">3</span>; i &gt;= <span class="m">1</span>; i--)\n    cout &lt;&lt; i &lt;&lt; <span class="s">" "</span>;`,
  ch:["1 2 3","3 2 1","3 2 1 0","2 1"],c:1,hint:"นับถอยหลัง i-- : 3,2,1"},
 {code:`<span class="k">int</span> s = <span class="m">0</span>;\n<span class="k">for</span> (<span class="k">int</span> i = <span class="m">1</span>; i &lt;= <span class="m">4</span>; i++)\n    s = s + i;\ncout &lt;&lt; s;`,
  ch:["7","9","10","24"],c:2,hint:"1+2+3+4 = 10"},
 {code:`<span class="k">for</span> (<span class="k">int</span> i = <span class="m">0</span>; i &lt; <span class="m">3</span>; i++)\n    cout &lt;&lt; i * <span class="m">2</span> &lt;&lt; <span class="s">" "</span>;`,
  ch:["0 2 4","2 4 6","0 1 2","1 2 3"],c:0,hint:"i*2 เมื่อ i=0,1,2 → 0,2,4"},
 {code:`<span class="k">int</span> a[<span class="m">3</span>] = {<span class="m">5</span>, <span class="m">6</span>, <span class="m">7</span>};\n<span class="k">for</span> (<span class="k">int</span> i = <span class="m">0</span>; i &lt; <span class="m">3</span>; i++)\n    cout &lt;&lt; a[i] &lt;&lt; <span class="s">" "</span>;`,
  ch:["5 6 7","0 1 2","6 7 8","7 6 5"],c:0,hint:"วนพิมพ์ทุกช่องของอาเรย์ตามลำดับ"},
 {code:`<span class="k">int</span> i = <span class="m">1</span>;\n<span class="k">while</span> (i &lt;= <span class="m">3</span>) {\n    cout &lt;&lt; i;\n    i++;\n}`,
  ch:["123","1 2 3","112233","321"],c:0,hint:"while พิมพ์ติดกันไม่มีเว้นวรรค: 123"},
 {code:`<span class="k">for</span> (<span class="k">int</span> i = <span class="m">1</span>; i &lt;= <span class="m">6</span>; i++)\n    <span class="k">if</span> (i % <span class="m">2</span> == <span class="m">0</span>)\n        cout &lt;&lt; i &lt;&lt; <span class="s">" "</span>;`,
  ch:["1 3 5","2 4 6","1 2 3 4 5 6","0 2 4 6"],c:1,hint:"พิมพ์เฉพาะเลขคู่ (i%2==0): 2,4,6"},
 {code:`<span class="k">int</span> a[<span class="m">4</span>] = {<span class="m">10</span>, <span class="m">20</span>, <span class="m">30</span>, <span class="m">40</span>};\ncout &lt;&lt; a[<span class="m">0</span>] + a[<span class="m">3</span>];`,
  ch:["30","40","50","70"],c:2,hint:"a[0]=10 + a[3]=40 = 50 (index เริ่ม 0)"},
];

let qi=0, turn=0, scA=0, scB=0, answered=false;

function cheer(){const m=$("mascot");if(m){m.classList.remove("cheer");void m.offsetWidth;m.classList.add("cheer");setTimeout(()=>m.classList.remove("cheer"),800);}}

function renderTurn(){
  $("teamA").classList.toggle("turn",turn===0);
  $("teamB").classList.toggle("turn",turn===1);
  $("turn").textContent="ตาทีม "+(turn===0?"A":"B");
  $("turn").style.background= turn===0?"linear-gradient(135deg,#2f7bf6,#7a5cff)":"linear-gradient(135deg,#ff6a3d,#f2a900)";
}
function renderQ(){
  const q=QS[qi];answered=false;
  $("prog").textContent=`ข้อ ${qi+1} / ${QS.length}`;
  $("code").innerHTML=q.code;
  $("fb").className="fb";$("fb").textContent="";
  $("opts").innerHTML=q.ch.map((c,j)=>`<button class="opt" data-j="${j}" onclick="answer(${j})">${c}</button>`).join("");
  renderTurn();icons();
}
function answer(j){
  if(answered)return;answered=true;
  const q=QS[qi];
  document.querySelectorAll(".opt").forEach(o=>{o.disabled=true;
    const k=+o.dataset.j; if(k===q.c)o.classList.add("right"); else if(k===j)o.classList.add("wrong");});
  if(j===q.c){
    if(turn===0){scA++;$("scA").textContent=scA;}else{scB++;$("scB").textContent=scB;}
    $("fb").className="fb ok";$("fb").innerHTML=`✓ ถูกต้อง! ทีม ${turn===0?"A":"B"} ได้ 1 คะแนน`;
    cheer();
  }else{
    $("fb").className="fb no";$("fb").innerHTML=`✗ ยังไม่ใช่ — ${q.hint}`;
  }
  setTimeout(next,1500);
}
function next(){
  qi++;
  if(qi>=QS.length){return end();}
  turn=1-turn; // สลับทีม
  renderQ();
}
function end(){
  $("overlay").classList.add("show");
  let t,s;
  if(scA>scB){t="🏆 ทีม A ชนะ!";s=`ทีม A ${scA} : ${scB} ทีม B`;}
  else if(scB>scA){t="🏆 ทีม B ชนะ!";s=`ทีม B ${scB} : ${scA} ทีม A`;}
  else{t="เสมอกัน!";s=`${scA} : ${scB} — สูสีมาก!`;}
  $("winTitle").textContent=t;$("winSub").textContent=s;icons();
}
function resetGame(){
  qi=0;turn=0;scA=0;scB=0;answered=false;
  $("scA").textContent="0";$("scB").textContent="0";
  $("overlay").classList.remove("show");
  renderQ();
}
renderQ();icons();
</script>
</body>
</html>
