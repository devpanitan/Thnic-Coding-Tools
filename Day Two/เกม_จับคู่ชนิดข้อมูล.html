<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SRRU | เกมจับคู่ชนิดข้อมูล (Type)</title>
<link rel="icon" type="image/png" href="../Day One/srru-logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<style>
  :root{
    --ink:#12151a;
    --paper:#ffffff;
    --rule:#c9d0d9;
    --soft:#f0f3f7;
    --muted:#59626f;
    --accent:#2f2a9e;
    --amber:#a35405; --amber-bg:#fef1d6;
    --green:#0f7a4a; --green-bg:#e2f5ea;
    --red:#b0191b;  --red-bg:#fde2e2;
    --hl:#ffee9c;
    --font:'LINE Seed Sans TH','LINESeedSansTH',sans-serif;
    /* ชื่อเดิมที่โค้ดอ้างถึง — ชี้เข้าชุดสีธีม */
    --blue:#2f2a9e;--purple:#2f2a9e;--coral:#b0191b;--line:#c9d0d9;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
  html,body{height:100%}
  body{color:var(--ink);height:100vh;overflow:hidden;background:var(--paper);
    display:flex;flex-direction:column;gap:clamp(10px,2vh,18px);padding:0 0 clamp(10px,2vh,20px)}
  svg.lucide{width:1em;height:1em;vertical-align:-.15em;flex:0 0 auto;stroke-width:2.2}
  .hintbar,.card{margin:0 clamp(14px,3vw,36px)}
  .head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    border-bottom:4px solid var(--ink);padding:11px clamp(14px,3vw,36px)}
  .head img{height:clamp(34px,5vh,48px)}
  h1{font-size:clamp(20px,3vh,26px);font-weight:800;letter-spacing:-.01em}
  .head .tag{color:var(--muted);font-size:clamp(13px,1.7vh,16px);flex:1;min-width:200px}
  .score{font-weight:700;font-size:clamp(15px,2.2vh,19px);background:#fff;border:3px solid var(--ink);border-radius:11px;padding:6px 16px}
  .hintbar{background:var(--amber-bg);border-left:6px solid var(--amber);border-radius:0 9px 9px 0;padding:8px 15px;font-size:clamp(12px,1.7vh,15px);color:var(--ink);display:flex;flex-wrap:wrap;gap:3px 14px;align-items:center}
  .hintbar b{color:var(--ink);background:var(--hl);padding:0 4px;font-family:ui-monospace,Consolas,monospace}
  .hintbar .ti{color:var(--amber);font-weight:700}
  .card{background:#fff;border:3px solid var(--ink);border-radius:13px;
    flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:clamp(16px,3vh,30px);gap:clamp(12px,2.2vh,22px)}
  .qno{color:var(--accent);font-weight:800;font-size:clamp(14px,1.9vh,17px)}
  .qlabel{font-size:clamp(16px,2.3vh,20px);color:var(--muted);font-weight:700}
  .val{font-family:ui-monospace,Consolas,monospace;font-size:clamp(34px,7vh,64px);font-weight:700;color:#fff;background:var(--ink);border:3px solid var(--ink);border-radius:13px;padding:1.5vh 4vh}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,1.8vh,16px);width:min(680px,94%)}
  .opt{font-family:var(--font);font-weight:700;padding:clamp(12px,2vh,18px);border-radius:9px;border:2.5px solid transparent;background:var(--soft);color:var(--ink);cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:2px;align-items:center}
  .opt .ext{font-family:ui-monospace,Consolas,monospace;font-size:clamp(18px,2.8vh,26px);color:var(--accent)}
  .opt small{font-weight:500;color:var(--muted);font-size:clamp(12px,1.6vh,15px)}
  .opt:hover{border-color:var(--ink);transform:translateY(-3px)}
  .opt.correct{background:var(--green);border-color:var(--green)}.opt.correct .ext,.opt.correct small{color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ext{color:var(--red)}
  .opt:disabled{cursor:default;transform:none}
  .fb{font-size:clamp(15px,2.3vh,20px);font-weight:700;min-height:1.4em}
  .fb.ok{color:var(--green)}.fb.no{color:var(--red)}
  .nav{display:flex;gap:12px}
  .btn{font-family:var(--font);font-size:clamp(15px,2.2vh,18px);font-weight:700;padding:10px 22px;border:0;border-radius:9px;cursor:pointer;display:inline-flex;gap:8px;align-items:center}
  .btn.go{background:var(--ink);color:#fff;border:3px solid var(--ink)}
  .btn.ghost{background:#fff;color:var(--ink);border:3px solid var(--ink)}
  .btn.ghost:hover{background:var(--soft)}
  .btn:disabled{opacity:.4;cursor:default}
  .confetti{position:fixed;top:-10px;width:10px;height:16px;z-index:50;border-radius:2px;pointer-events:none}
  .mascot{position:fixed;left:clamp(8px,2vw,30px);bottom:clamp(6px,2vh,20px);width:clamp(96px,13vh,140px);height:auto;z-index:4;transform-origin:center bottom;animation:dance 1.4s ease-in-out infinite}
  @keyframes dance{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-11px) rotate(5deg)}}
  .mascot .armL,.mascot .armR{transform-box:fill-box;transform-origin:center top}
  .mascot .armL{animation:dL .62s ease-in-out infinite}.mascot .armR{animation:dR .62s ease-in-out infinite}
  @keyframes dL{0%,100%{transform:rotate(-30deg)}50%{transform:rotate(24deg)}}
  @keyframes dR{0%,100%{transform:rotate(30deg)}50%{transform:rotate(-24deg)}}
  .mascot.cheer{animation:mcheer .8s ease}
  @keyframes mcheer{0%{transform:translateY(0)}30%{transform:translateY(-34px) scale(1.1)}60%{transform:translateY(0)}80%{transform:translateY(-14px)}100%{transform:translateY(0)}}
  @media (max-width:760px){.mascot{width:84px;opacity:.85}}
</style>
</head>
<body>
  <div class="head">
    <img src="../Day One/srru-logo.png" alt="SRRU" onerror="this.style.display='none'">
    <h1>จับคู่ชนิดข้อมูล</h1>
    <span class="tag">ค่านี้ควรเก็บในตัวแปรชนิดไหน? (int / double / char / string / bool)</span>
    <span class="score" id="score">คะแนน 0</span>
  </div>
  <div class="hintbar">
    <span class="ti">เคล็ดลับดูชนิด:</span>
    <span>เลขเต็ม → <b>int</b></span><span>มีจุด . → <b>double</b></span>
    <span>' ' 1 ตัว → <b>char</b></span><span>" " ข้อความ → <b>string</b></span>
    <span>true/false → <b>bool</b></span>
  </div>

  <div class="card" id="card"></div>

  <svg class="mascot" id="mascot" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <line x1="110" y1="20" x2="110" y2="42" stroke="#2f2a9e" stroke-width="5"/><circle cx="110" cy="15" r="9" fill="#ffd977" stroke="#2f2a9e" stroke-width="3"/>
    <g class="armL"><rect x="24" y="120" width="20" height="52" rx="10" fill="#cbd6f5" stroke="#2f2a9e" stroke-width="3"/><circle cx="34" cy="176" r="12" fill="#fff" stroke="#2f2a9e" stroke-width="3"/></g>
    <g class="armR"><rect x="176" y="120" width="20" height="52" rx="10" fill="#cbd6f5" stroke="#2f2a9e" stroke-width="3"/><circle cx="186" cy="176" r="12" fill="#fff" stroke="#2f2a9e" stroke-width="3"/></g>
    <rect x="48" y="42" width="124" height="96" rx="28" fill="#eef2ff" stroke="#2f2a9e" stroke-width="5"/>
    <ellipse cx="74" cy="104" rx="11" ry="7" fill="#ffb3c1" opacity=".8"/><ellipse cx="146" cy="104" rx="11" ry="7" fill="#ffb3c1" opacity=".8"/>
    <circle cx="88" cy="84" r="15" fill="#fff" stroke="#2f2a9e" stroke-width="3"/><circle cx="88" cy="84" r="7" fill="#2f2a9e"/>
    <circle cx="132" cy="84" r="15" fill="#fff" stroke="#2f2a9e" stroke-width="3"/><circle cx="132" cy="84" r="7" fill="#2f2a9e"/>
    <rect x="88" y="110" width="44" height="16" rx="8" fill="#0f7a4a"/>
    <rect x="64" y="148" width="92" height="58" rx="16" fill="#fff" stroke="#2f2a9e" stroke-width="4"/><rect x="80" y="164" width="60" height="28" rx="8" fill="#e6f0ff"/><path d="M80 178 H140 M98 168 V188" stroke="#2f2a9e" stroke-width="3"/>
  </svg>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const T={int:["int","จำนวนเต็ม"],double:["double","ทศนิยม"],char:["char","อักขระ 1 ตัว"],string:["string","ข้อความ"],bool:["bool","จริง/เท็จ"]};
const HINT={int:"เป็นเลขจำนวนเต็ม ไม่มีจุดทศนิยม",double:"มีจุดทศนิยม (.)",char:"อักขระตัวเดียวอยู่ใน ' '",string:"ข้อความอยู่ใน \" \"",bool:"ค่าเป็น true หรือ false"};
const Q=[
 ["42","int"],["3.14","double"],["'A'","char"],['"สวัสดี"',"string"],["true","bool"],
 ["-7","int"],["9.5","double"],["'x'","char"],['"Hello123"',"string"],["false","bool"],
 ["0","int"],["-0.5","double"],["'9'","char"],['"7-11"',"string"],["100","int"],
];
let i=0,score=0;const answers={},optsCache={};
const card=document.getElementById("card");
const icons=()=>{if(window.lucide)lucide.createIcons();};
const shuffle=a=>{for(let k=a.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]];}return a;};
function cheer(){const m=document.getElementById("mascot");if(m){m.classList.remove("cheer");void m.offsetWidth;m.classList.add("cheer");setTimeout(()=>m.classList.remove("cheer"),800);}}
function getOpts(idx){if(!optsCache[idx]){const ans=Q[idx][1];const others=shuffle(Object.keys(T).filter(k=>k!==ans)).slice(0,3);optsCache[idx]=shuffle([ans,...others]);}return optsCache[idx];}
function render(){
  const [val,ans]=Q[i],done=answers[i]!==undefined,opts=getOpts(i);
  card.innerHTML=`<div class="qno">ข้อ ${i+1} / ${Q.length}</div>
    <div class="qlabel">ค่านี้เป็นชนิดอะไร?</div>
    <div class="val">${val}</div>
    <div class="opts">${opts.map(k=>`<button class="opt" data-k="${k}"><span class="ext">${T[k][0]}</span><small>${T[k][1]}</small></button>`).join("")}</div>
    <div class="fb" id="fb"></div>
    <div class="nav">
      <button class="btn ghost" id="prev"><i data-lucide="arrow-left"></i> ย้อนกลับ</button>
      <button class="btn go" id="next" ${done?'':'disabled'}>${i<Q.length-1?'ข้อถัดไป <i data-lucide="arrow-right"></i>':'ดูผลคะแนน <i data-lucide="flag"></i>'}</button>
    </div>`;
  const fb=document.getElementById("fb");
  if(done){const ch=answers[i];
    card.querySelectorAll(".opt").forEach(b=>{b.disabled=true;if(b.dataset.k===ans)b.classList.add("correct");else if(b.dataset.k===ch)b.classList.add("wrong");});
    if(ch===ans){fb.className="fb ok";fb.textContent="ถูกต้อง! "+T[ans][0]+" — "+HINT[ans];}
    else{fb.className="fb no";fb.textContent="คำตอบคือ "+T[ans][0]+" — "+HINT[ans];}
  }else{card.querySelectorAll(".opt").forEach(b=>b.onclick=()=>choose(b.dataset.k,ans));}
  document.getElementById("prev").disabled=i<=0;
  document.getElementById("prev").onclick=()=>{if(i>0){i--;render();}};
  document.getElementById("next").onclick=()=>{if(answers[i]===undefined)return;if(i<Q.length-1){i++;render();}else end();};
  document.getElementById("score").textContent="คะแนน "+score;icons();
}
function choose(key,ans){if(answers[i]!==undefined)return;answers[i]=key;if(key===ans){score++;cheer();}render();}
function end(){card.innerHTML=`<div class="val" style="color:var(--green);border-color:var(--green);background:var(--green-bg)">${score} / ${Q.length}</div>
  <button class="btn go" id="again"><i data-lucide="rotate-ccw"></i> เล่นอีกครั้ง</button>`;
  document.getElementById("again").onclick=()=>location.reload();icons();burst();}
function burst(){const cs=['#2f2a9e','#0f7a4a','#a35405','#b0191b','#ffd977'];
  for(let k=0;k<80;k++){const c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"vw";c.style.background=cs[k%cs.length];document.body.appendChild(c);
    const d=1600+Math.random()*1400;c.animate([{transform:"translateY(0)",opacity:1},{transform:`translateY(105vh) rotate(${Math.random()*720}deg)`,opacity:.2}],{duration:d});setTimeout(()=>c.remove(),d);}}
render();icons();
</script>
</body>
</html>
