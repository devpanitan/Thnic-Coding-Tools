<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>มินิโจทย์โอลิมปิก — วันที่ 2 (Operators &amp; if-else)</title>
<link rel="icon" type="image/png" href="../Day One/srru-logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{--bg:#eef2f8;--card:#fff;--ink:#1e2740;--muted:#5b6478;--line:#e3e8f1;
    --blue:#2f6fd6;--green:#22a565;--gold:#f59e0b;--purple:#7c5cff;--red:#db5757;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'LINE Seed Sans TH',system-ui,sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#f7faff,var(--bg));color:var(--ink);min-height:100vh;padding:18px 14px 40px}
  .wrap{max-width:820px;margin:0 auto}
  .head{text-align:center;margin-bottom:12px}
  .head h1{font-size:23px;letter-spacing:-.4px}
  .head .sub{color:var(--muted);font-size:14px;margin-top:3px}

  .bar{display:flex;align-items:center;gap:10px;justify-content:center;margin:12px 0}
  .dots{display:flex;gap:7px}
  .dot{width:30px;height:30px;border-radius:9px;background:#fff;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--muted);cursor:pointer}
  .dot.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .dot.ok{background:var(--green);color:#fff;border-color:var(--green)}
  .score{background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:5px 15px;font-weight:800;font-size:14px}
  .score b{color:var(--green)}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:20px 24px;box-shadow:0 14px 36px rgba(40,50,80,.08);display:none}
  .card.on{display:block}
  .tag{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:12.5px;padding:4px 12px;border-radius:999px;background:#eef2ff;color:#3b57d6;margin-bottom:8px}
  .tag i{width:15px;height:15px}
  .card h2{font-size:20px;margin-bottom:6px}
  .stmt{font-size:15px;line-height:1.55;color:#3a4356;margin-bottom:12px}
  .stmt b{color:var(--ink)}
  .io{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
  .iobox{flex:1;min-width:150px;background:#f6f8fc;border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13.5px}
  .iobox .l{color:var(--muted);font-weight:700;font-size:12px;margin-bottom:2px}
  .iobox code{font-family:ui-monospace,monospace;font-size:14px;color:var(--blue);font-weight:700}

  .code{background:#11203a;border-radius:12px;padding:13px 16px;font-family:ui-monospace,Consolas,monospace;font-size:13.5px;line-height:1.75;color:#e8eefc;white-space:pre;overflow-x:auto;margin:10px 0}
  .kk{color:#ff9bd0}.cc{color:#8aa0c0;font-style:italic}.ss{color:#9ad27f}.nn{color:#ffd27f}.io2{color:#5ad1ff}
  .blank{background:#fff2cf;color:#a8730a;border-radius:5px;padding:0 8px;font-weight:800;border:1px dashed #e0a94a}
  .blank.ok{background:#d8f3e4;color:#0d7a49;border-color:#8fdcb0}
  .blank.no{background:#fbdada;color:#b3271f;border-color:#f0a9a9}

  .q{margin-top:14px}
  .q .qh{font-weight:800;font-size:14.5px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .q .qh i{width:16px;height:16px;color:var(--gold)}
  .opts{display:flex;gap:8px;flex-wrap:wrap}
  .opt{font-family:ui-monospace,monospace;font-weight:700;font-size:14px;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px 15px;cursor:pointer;transition:.15s}
  .opt:hover{border-color:var(--purple)}
  .opt.sel{border-color:var(--purple);background:#f3f0ff;color:#5b3fd6}
  .opt.ok{border-color:var(--green);background:#e7faf0;color:#0d7a49}
  .opt.no{border-color:var(--red);background:#fdeaea;color:#b3271f}
  .predict{display:flex;align-items:center;gap:9px;margin-top:6px;flex-wrap:wrap}
  .predict input{font-family:ui-monospace,monospace;font-size:15px;font-weight:700;border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;width:120px;text-align:center}
  .predict .l{font-weight:700;font-size:14px;color:var(--muted)}

  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}
  .btn{font-family:inherit;font-weight:800;font-size:14px;border:0;border-radius:11px;padding:9px 18px;cursor:pointer;color:#fff;display:inline-flex;align-items:center;gap:7px}
  .btn.check{background:linear-gradient(135deg,var(--green),#199150)}
  .btn.ghost{background:#eef1f6;color:#48505c;border:1.5px solid var(--line)}
  .run{text-decoration:none;font-weight:800;font-size:13.5px;color:#b6730a;display:inline-flex;align-items:center;gap:6px}
  .fb{margin-top:12px;font-weight:700;font-size:14.5px;border-radius:11px;padding:10px 14px;display:none;line-height:1.5}
  .fb.show{display:block}
  .fb.ok{background:#e7faf0;color:#0d7a49;border:1.5px solid #a8ddba}
  .fb.no{background:#fdeaea;color:#b3271f;border:1.5px solid #f0b8b8}

  .nav{display:flex;justify-content:space-between;margin-top:16px}
  .nav button{font-family:inherit;font-weight:800;font-size:14px;border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:9px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:var(--ink)}
  .nav button:disabled{opacity:.35;cursor:default}
  .nav .primary{background:var(--ink);color:#fff;border-color:var(--ink)}

  .sum{text-align:center}
  .sum .big{font-size:44px;font-weight:800;color:var(--green);margin:6px 0}
  .links{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
  .links a{text-decoration:none;font-weight:800;font-size:13.5px;border:1.5px solid var(--line);border-radius:11px;padding:9px 14px;color:var(--ink);display:inline-flex;align-items:center;gap:7px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>มินิโจทย์โอลิมปิก · วันที่ 2</h1>
    <div class="sub">ฝึก Operators &amp; if-else — แกะจากโจทย์จริง TOI: difference &amp; find (เวอร์ชันเต็มไว้แก้วันที่ 3)</div>
  </div>

  <div class="bar">
    <div class="dots" id="dots"></div>
    <span class="score">คะแนน <b id="sc">0</b> / 4</span>
  </div>

  <div id="cards"></div>

  <div class="nav">
    <button id="prev" onclick="nav(-1)"><i data-lucide="chevron-left"></i> ก่อนหน้า</button>
    <button id="next" class="primary" onclick="nav(1)">ถัดไป <i data-lucide="chevron-right"></i></button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
function icons(){if(window.lucide)lucide.createIcons();}

const PROBS=[
  { src:'จากโจทย์ TOI: difference', title:'ข้อ 1 · ผลต่าง |A − B|',
    stmt:'รับจำนวนเต็ม 2 ค่า A และ B แล้วพิมพ์ <b>ผลต่างแบบค่าสัมบูรณ์</b> |A − B| (ผลต่างที่เป็นบวกเสมอ) — นี่คือหัวใจของโจทย์ difference เวอร์ชัน 2 เลข',
    code:[
      '<span class="kk">int</span> A, B;  <span class="io2">cin</span> &gt;&gt; A &gt;&gt; B;',
      '<span class="kk">if</span> ( <span class="blank" id="bk">?</span> )',
      '    <span class="io2">cout</span> &lt;&lt; A - B;   <span class="cc">// A มากกว่า</span>',
      '<span class="kk">else</span>',
      '    <span class="io2">cout</span> &lt;&lt; B - A;   <span class="cc">// B มากกว่า (หรือเท่ากัน)</span>'
    ],
    opts:['A &gt; B','A &lt; B','A + B'], ans:0,
    testLabel:'A = 3, B = 8', testAns:'5',
    explain:'ถ้า A &gt; B ผลต่างคือ A−B ไม่งั้นใช้ B−A เพื่อให้ได้ค่าบวกเสมอ · A=3,B=8 → B มากกว่า → 8−3 = 5' },

  { src:'พื้นฐาน if-else (ชิ้นส่วนของ difference/find)', title:'ข้อ 2 · หาค่ามากสุดของ 2 เลข',
    stmt:'รับจำนวนเต็ม 2 ค่า A และ B แล้วพิมพ์ <b>ค่าที่มากกว่า</b> — เป็นชิ้นส่วนที่ใช้ทั้งในการหา max−min และการเทียบค่า',
    code:[
      '<span class="kk">int</span> A, B;  <span class="io2">cin</span> &gt;&gt; A &gt;&gt; B;',
      '<span class="kk">if</span> ( <span class="blank" id="bk">?</span> )',
      '    <span class="io2">cout</span> &lt;&lt; A;',
      '<span class="kk">else</span>',
      '    <span class="io2">cout</span> &lt;&lt; B;'
    ],
    opts:['A &gt; B','A &lt; B','A == B'], ans:0,
    testLabel:'A = 4, B = 9', testAns:'9',
    explain:'ถ้า A &gt; B พิมพ์ A ไม่งั้นพิมพ์ B · A=4,B=9 → 4 ไม่มากกว่า 9 → พิมพ์ B = 9' },

  { src:'จากกิจกรรม Human Dataset (เศษหาร) — ปู gcd', title:'ข้อ 3 · เลขคู่หรือเลขคี่',
    stmt:'รับจำนวนเต็ม n แล้วบอกว่าเป็น <b>เลขคู่ (even)</b> หรือ <b>เลขคี่ (odd)</b> — ใช้ตัวดำเนินการ <code>%</code> (เศษจากการหาร) ที่หนูเล่นในกิจกรรมจับกลุ่มเศษ',
    code:[
      '<span class="kk">int</span> n;  <span class="io2">cin</span> &gt;&gt; n;',
      '<span class="kk">if</span> ( <span class="blank" id="bk">?</span> )',
      '    <span class="io2">cout</span> &lt;&lt; <span class="ss">"even"</span>;',
      '<span class="kk">else</span>',
      '    <span class="io2">cout</span> &lt;&lt; <span class="ss">"odd"</span>;'
    ],
    opts:['n % 2 == 0','n / 2 == 0','n * 2 == 0'], ans:0,
    testLabel:'n = 7', testAns:'odd',
    explain:'n % 2 คือเศษจากการหาร 2 — ถ้าเศษ 0 = คู่ · 7 % 2 = 1 (ไม่ใช่ 0) → odd' },

  { src:'จากโจทย์ TOI: find (Binary Search)', title:'ข้อ 4 · เขียนท่อนเทียบของ Binary Search',
    stmt:'เมื่อวานหนูเล่น “ล่าเลขลับ” มาแล้ว — วันนี้เขียน <b>เงื่อนไขที่ขับมัน</b> เติมช่องว่างของกิ่ง “ต่ำไป” ให้ถูก (ยังไม่ต้องใส่ลูป เดี๋ยววันที่ 3 ใส่ครบ)',
    code:[
      '<span class="kk">if</span> (mid == K)',
      '    <span class="io2">cout</span> &lt;&lt; <span class="ss">"เจอ!"</span>;',
      '<span class="kk">else if</span> ( <span class="blank" id="bk">?</span> )',
      '    <span class="io2">cout</span> &lt;&lt; <span class="ss">"ต่ำไป"</span>;',
      '<span class="kk">else</span>',
      '    <span class="io2">cout</span> &lt;&lt; <span class="ss">"สูงไป"</span>;'
    ],
    opts:['mid &lt; K','mid &gt; K','mid == K'], ans:0,
    testLabel:'mid = 50, K = 73', testAns:'ต่ำไป',
    explain:'“ต่ำไป” = ค่าที่เดา (mid) น้อยกว่าเลขลับ (K) → เงื่อนไข mid &lt; K · mid=50 &lt; K=73 → พิมพ์ “ต่ำไป”' }
];

let idx=0, sel=-1, solved=[false,false,false,false];

function buildCards(){
  $('cards').innerHTML=PROBS.map((p,i)=>{
    return '<div class="card'+(i===0?' on':'')+'" data-i="'+i+'">'+
      '<span class="tag"><i data-lucide="trophy"></i> '+p.src+'</span>'+
      '<h2>'+p.title+'</h2>'+
      '<div class="stmt">'+p.stmt+'</div>'+
      '<div class="code">'+p.code.join('\n')+'</div>'+
      '<div class="q"><div class="qh"><i data-lucide="puzzle"></i> 1) เติมเงื่อนไขในช่องว่าง (▢)</div>'+
        '<div class="opts">'+p.opts.map((o,j)=>'<button class="opt" onclick="pick('+i+','+j+')">'+o+'</button>').join('')+'</div></div>'+
      '<div class="q"><div class="qh"><i data-lucide="terminal"></i> 2) ทดสอบ: ถ้า input = <code style="color:#2f6fd6">'+p.testLabel+'</code> โปรแกรมพิมพ์อะไร?</div>'+
        '<div class="predict"><span class="l">ผลลัพธ์:</span><input id="pr'+i+'" placeholder="พิมพ์คำตอบ"></div></div>'+
      '<div class="actions"><button class="btn check" onclick="check('+i+')"><i data-lucide="check-check"></i> ตรวจคำตอบ</button>'+
        '<a class="run" href="https://onecompiler.com/cpp" target="_blank"><i data-lucide="external-link"></i> เขียนเต็ม + รันที่ OneCompiler</a></div>'+
      '<div class="fb" id="fb'+i+'"></div>'+
    '</div>';
  }).join('');
}
function buildDots(){
  $('dots').innerHTML=PROBS.map((p,i)=>'<div class="dot'+(i===idx?' on':'')+(solved[i]?' ok':'')+'" onclick="go('+i+')">'+(i+1)+'</div>').join('');
}
function show(){
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('on',+c.dataset.i===idx));
  $('prev').disabled=idx===0;
  $('next').innerHTML=idx>=PROBS.length-1?'<i data-lucide="flag"></i> สรุป':'ถัดไป <i data-lucide="chevron-right"></i>';
  sel=-1;buildDots();icons();window.scrollTo({top:0,behavior:'smooth'});
}
function go(i){idx=i;show();}
function nav(d){ if(idx>=PROBS.length-1&&d>0){showSummary();return;} idx=Math.max(0,Math.min(PROBS.length-1,idx+d));show(); }

function pick(i,j){
  if(i!==idx)return;
  sel=j;
  const card=document.querySelector('.card[data-i="'+i+'"]');
  card.querySelectorAll('.opt').forEach((o,k)=>o.classList.toggle('sel',k===j));
}
function check(i){
  const p=PROBS[i], card=document.querySelector('.card[data-i="'+i+'"]');
  const opts=card.querySelectorAll('.opt');
  const pr=(card.querySelector('#pr'+i).value||'').trim().toLowerCase();
  const want=p.testAns.toLowerCase();
  const blankOk=sel===p.ans, predOk=pr===want;
  // mark options
  opts.forEach((o,k)=>{o.classList.remove('ok','no');if(k===p.ans)o.classList.add('ok');else if(k===sel)o.classList.add('no');});
  // mark blank in code
  const bk=card.querySelector('#bk');
  if(sel>=0){bk.textContent=stripTags(p.opts[sel]);bk.className='blank '+(blankOk?'ok':'no');}
  const fb=card.querySelector('#fb'+i);fb.className='fb show '+((blankOk&&predOk)?'ok':'no');
  if(blankOk&&predOk){ fb.innerHTML='<i data-lucide="party-popper"></i> ถูกทั้งสองข้อ! '+p.explain; if(!solved[i]){solved[i]=true;} }
  else{ let miss=[]; if(!blankOk)miss.push('เงื่อนไขในช่องว่าง'); if(!predOk)miss.push('ผลลัพธ์ที่ทำนาย'); fb.innerHTML='<i data-lucide="alert-triangle"></i> ยังไม่ถูกที่: <b>'+miss.join(' และ ')+'</b><br><span style="font-weight:400">คำใบ้: '+p.explain+'</span>'; }
  updateScore();buildDots();icons();
}
function stripTags(s){return s.replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/<[^>]+>/g,'');}
function updateScore(){$('sc').textContent=solved.filter(Boolean).length;}

function showSummary(){
  const n=solved.filter(Boolean).length;
  $('cards').innerHTML='<div class="card on sum">'+
    '<span class="tag"><i data-lucide="sparkles"></i> สรุป</span>'+
    '<h2>จบมินิโจทย์วันที่ 2!</h2>'+
    '<div class="big">'+n+' / 4</div>'+
    '<div class="stmt" style="text-align:center">หนูฝึก operators (−, %) และ if-else จากโจทย์จริงแล้ว — '+
    (n===4?'เก่งมาก! ครบทุกข้อ':'ลองย้อนกลับไปทำข้อที่ยังไม่ครบได้')+'<br><b>พรุ่งนี้ (วันที่ 3)</b> เมื่อมีลูป/อาเรย์ เราจะกลับมาแก้ difference และ find แบบเต็ม!</div>'+
    '<div class="links">'+
      '<a href="../Day One/เกม3D_ล่าสมบัติ_BinarySearch.html"><i data-lucide="gem"></i> เกม 3D ล่าสมบัติ</a>'+
      '<a href="simulator3D_เงื่อนไข_ifelse.html"><i data-lucide="split"></i> 3D เงื่อนไข if-else</a>'+
      '<a href="https://onecompiler.com/cpp" target="_blank"><i data-lucide="terminal"></i> OneCompiler</a>'+
    '</div></div>';
  $('prev').disabled=false;$('next').style.display='none';
  document.querySelector('.bar').style.display='none';
  icons();
}

buildCards();buildDots();show();icons();
</script>
</body>
</html>
