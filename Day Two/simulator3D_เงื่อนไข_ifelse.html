<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D เงื่อนไข if-else — ประตูตัดสินใจ</title>
<link rel="icon" type="image/png" href="../Day One/srru-logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:'LINE Seed Sans TH',system-ui,sans-serif;color:#1e2740}
  #scene{position:fixed;inset:0;background:#ffffff}
  .hud{position:fixed;pointer-events:none;z-index:5}
  .panel{background:rgba(255,255,255,.94);border:1.5px solid #dfe4ee;border-radius:14px;box-shadow:0 12px 30px rgba(40,50,80,.14);backdrop-filter:blur(7px);pointer-events:auto}

  /* code panel */
  #code{top:14px;left:14px;padding:12px 14px;max-width:340px}
  #code h2{font-size:12.5px;color:#5b6478;margin-bottom:7px;display:flex;align-items:center;gap:6px}
  #code h2 i{width:15px;height:15px}
  .code{font-family:ui-monospace,Consolas,monospace;font-size:13px;line-height:1.65;color:#2a3550}
  .cl{white-space:pre;border-radius:5px;margin:0 -5px;padding:0 5px}
  .cl.T{background:#e3f7ec}.cl.F{background:#fde7e7}.cl.on{background:#fff2cf;box-shadow:inset 3px 0 0 #f2a900}
  .cl.fr{opacity:.5}
  .kk{color:#c0398a}.cc{color:#8a96a8;font-style:italic}.ss{color:#1f9d57}.nn{color:#c26a00}

  /* banner */
  #banner{top:14px;left:50%;transform:translateX(-50%);padding:9px 18px;font-weight:800;font-size:16px;text-align:center;min-width:260px}
  #banner .sm{font-weight:600;font-size:12.5px;color:#5b6478;margin-top:2px}
  #banner.T{border-color:#8fdcb0}#banner.F{border-color:#f0a9a9}

  /* controls */
  #ctrl{bottom:14px;left:50%;transform:translateX(-50%);padding:11px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:94vw}
  select,input{font-family:inherit;font-weight:700;font-size:14px;border:1.5px solid #dfe4ee;border-radius:10px;padding:7px 10px;color:#1e2740;background:#fff}
  input{width:66px;text-align:center;font-family:ui-monospace,monospace}
  .lab{font-weight:700;font-size:13.5px;color:#5b6478}
  .btn{font-family:inherit;font-weight:800;font-size:14px;border:0;border-radius:11px;padding:9px 18px;cursor:pointer;color:#fff;display:inline-flex;align-items:center;gap:6px}
  .btn.run{background:linear-gradient(135deg,#22a565,#199150)}
  .btn.ghost{background:#eef1f6;color:#48505c;border:1.5px solid #dfe4ee}

  #title{top:14px;right:14px;padding:8px 14px;font-weight:800;font-size:14px;text-align:right}
  #title .s{font-weight:600;font-size:11.5px;color:#5b6478}
  .hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);font-size:12px;color:#5b6478;background:rgba(255,255,255,.7);border-radius:8px;padding:3px 10px;z-index:5;pointer-events:none}
</style>
</head>
<body>
<div id="scene"></div>

<div class="hud panel" id="code">
  <h2><i data-lucide="code"></i> โค้ด C++</h2>
  <div class="code" id="codelines"></div>
</div>

<div class="hud panel" id="banner">พร้อมทดสอบเงื่อนไข<div class="sm">ตั้งค่าด้านล่าง แล้วกด “ปล่อยลูกบอล”</div></div>

<div class="hud panel" id="title">3D เงื่อนไข if-else<div class="s">ประตูตัดสินใจ · SRRU × THNIC</div></div>

<div class="hud panel" id="ctrl"></div>
<div class="hint">ลากเมาส์เพื่อหมุนมุมกล้อง</div>

<script>
const $=id=>document.getElementById(id);
function icons(){if(window.lucide)lucide.createIcons();}

// ---------- THREE setup ----------
let scene,camera,renderer,ball,ballLabel,clock;
let ramps=[],bins=[];
const target=new THREE.Vector3(0,4,0);
let radius=30,theta=0.62,phi=1.15;

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xffffff);
  scene.fog=new THREE.Fog(0xffffff,44,120);
  camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,300);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  $('scene').appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xffffff,0x9aa0aa,0.85));
  const dir=new THREE.DirectionalLight(0xffffff,0.75);
  dir.position.set(12,26,14);dir.castShadow=true;
  dir.shadow.mapSize.set(2048,2048);dir.shadow.camera.near=1;dir.shadow.camera.far=80;
  dir.shadow.camera.left=-30;dir.shadow.camera.right=30;dir.shadow.camera.top=30;dir.shadow.camera.bottom=-30;
  scene.add(dir);

  const grid=new THREE.GridHelper(120,60,0xccd2dc,0xe6e9ef);grid.position.y=0.01;scene.add(grid);
  const catcher=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.ShadowMaterial({opacity:.16}));
  catcher.rotation.x=-Math.PI/2;catcher.receiveShadow=true;scene.add(catcher);

  // gate splitter (a cone pointing up) at (0,9,0)
  const gate=new THREE.Mesh(new THREE.ConeGeometry(1.5,2.4,4),new THREE.MeshStandardMaterial({color:0x46506a,roughness:.6}));
  gate.position.set(0,9.2,0);gate.rotation.y=Math.PI/4;gate.castShadow=true;scene.add(gate);
  const post=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,8,16),new THREE.MeshStandardMaterial({color:0x5b6478,roughness:.7}));
  post.position.set(0,4,0);post.castShadow=true;scene.add(post);

  // ball
  ball=new THREE.Mesh(new THREE.SphereGeometry(1.3,40,40),new THREE.MeshStandardMaterial({color:0x2f6fd6,roughness:.35,metalness:.1}));
  ball.position.set(0,16,0);ball.castShadow=true;scene.add(ball);
  ballLabel=makeSprite();scene.add(ballLabel);

  clock=new THREE.Clock();
  addEventListener('resize',onResize);
  initDrag();
  animate();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}

// drag orbit + zoom (wheel + pinch)
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function initDrag(){
  const el=renderer.domElement;
  const ptrs=new Map();let pinch=0;
  el.addEventListener('pointerdown',e=>{ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});});
  addEventListener('pointerup',e=>{ptrs.delete(e.pointerId);pinch=0;});
  addEventListener('pointercancel',e=>{ptrs.delete(e.pointerId);pinch=0;});
  addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId))return;
    const prev=ptrs.get(e.pointerId);
    if(ptrs.size===1){theta-=(e.clientX-prev.x)*0.006;phi=clamp(phi-(e.clientY-prev.y)*0.005,0.3,1.45);}
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===2){const p=[...ptrs.values()];const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);if(pinch)radius=clamp(radius-(d-pinch)*0.06,12,64);pinch=d;}
  });
  el.addEventListener('wheel',e=>{e.preventDefault();radius=clamp(radius+e.deltaY*0.02,12,64);},{passive:false});
}
function updateCam(){
  camera.position.set(target.x+radius*Math.sin(phi)*Math.sin(theta),target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(target);
}

// ---------- ramps / bins ----------
function makeRamp(x1,y1,x2,y2,color){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  const geo=new THREE.BoxGeometry(len,0.5,4);
  const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:color,roughness:.7}));
  m.position.set((x1+x2)/2,(y1+y2)/2,0);m.rotation.z=Math.atan2(dy,dx);m.castShadow=true;m.receiveShadow=true;
  scene.add(m);ramps.push(m);
}
function makeSprite(){const c=document.createElement('canvas');c.width=256;c.height=96;const sp=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true,depthTest:false}));sp.userData={c};sp.scale.set(5.4,2,1);sp.renderOrder=10;return sp;}
function setSprite(sp,text,color){const c=sp.userData.c,ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle=color;ctx.font='bold 54px "LINE Seed Sans TH",Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,128,50);if(sp.material.map)sp.material.map.dispose();const tex=new THREE.CanvasTexture(c);tex.anisotropy=4;sp.material.map=tex;sp.material.needsUpdate=true;}
function makeBin(x,color,label){
  const g=new THREE.Group();
  const base=new THREE.Mesh(new THREE.BoxGeometry(5,0.8,5),new THREE.MeshStandardMaterial({color:color,roughness:.6}));
  base.castShadow=true;base.receiveShadow=true;g.add(base);
  const lab=makeSprite();setSprite(lab,label,'#'+color.toString(16).padStart(6,'0'));lab.position.set(0,3.2,0);g.add(lab);
  g.position.set(x,0.4,0);scene.add(g);bins.push({g,x,base,label});
}
function clearField(){ramps.forEach(r=>scene.remove(r));bins.forEach(b=>scene.remove(b.g));ramps=[];bins=[];}

// ---------- programs / outcomes ----------
let mode='ifelse',anim=null;

function buildField(){
  clearField();
  if(mode==='ifelse'){
    makeRamp(0,9,-10,1.6,0x2aa96a); makeBin(-10,0x2aa96a,'TRUE');
    makeRamp(0,9,10,1.6,0xdb5757);  makeBin(10,0xdb5757,'FALSE');
  }else{
    makeRamp(0,9,-11,1.6,0x2f6fd6); makeBin(-11,0x2f6fd6,'สูงไป');
    makeRamp(0,9.2,0,1.6,0x2aa96a); makeBin(0,0x2aa96a,'เจอ!');
    makeRamp(0,9,11,1.6,0xdb5757);  makeBin(11,0xdb5757,'ต่ำไป');
  }
}

function renderCode(hi,branch){
  const top=[
    '<span class="kk">#include</span> <span class="nn">&lt;iostream&gt;</span>',
    '<span class="kk">using namespace</span> std;',
    '<span class="kk">int</span> main() {'
  ];
  let body;
  if(mode==='ifelse'){
    const x=$('vx').value,op=$('op').value,thr=$('vt').value;
    body=[
      ['    <span class="kk">int</span> x = <span class="nn">'+x+'</span>;',''],
      ['    <span class="kk">if</span> (x '+esc(op)+' <span class="nn">'+thr+'</span>)',''],
      ['        <span class="kk">cout</span> &lt;&lt; <span class="ss">"จริง"</span>;   <span class="cc">// เมื่อเงื่อนไขเป็นจริง</span>','T'],
      ['    <span class="kk">else</span>',''],
      ['        <span class="kk">cout</span> &lt;&lt; <span class="ss">"เท็จ"</span>;   <span class="cc">// เมื่อเงื่อนไขเป็นเท็จ</span>','F']
    ];
  }else{
    const mid=$('vm').value,k=$('vk').value;
    body=[
      ['    <span class="kk">int</span> mid = <span class="nn">'+mid+'</span>, K = <span class="nn">'+k+'</span>;',''],
      ['    <span class="kk">if</span> (mid == K)',''],
      ['        <span class="kk">cout</span> &lt;&lt; <span class="ss">"เจอ!"</span>;','EQ'],
      ['    <span class="kk">else if</span> (mid &lt; K)',''],
      ['        <span class="kk">cout</span> &lt;&lt; <span class="ss">"ต่ำไป"</span>;','LT'],
      ['    <span class="kk">else</span>',''],
      ['        <span class="kk">cout</span> &lt;&lt; <span class="ss">"สูงไป"</span>;','GT']
    ];
  }
  const bottom=['    <span class="kk">return</span> <span class="nn">0</span>;','}'];
  let html=top.map(l=>'<div class="cl fr">'+l+'</div>').join('');
  html+=body.map(l=>{
    let cls='cl';
    if(branch&&l[1]===branch){cls+=' '+((branch==='F'||branch==='GT')?'F':'T');if(hi)cls+=' on';}
    return '<div class="'+cls+'">'+l[0]+'</div>';
  }).join('');
  html+=bottom.map(l=>'<div class="cl fr">'+l+'</div>').join('');
  $('codelines').innerHTML=html;
}
function esc(op){return op.replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function evalOutcome(){
  if(mode==='ifelse'){
    const x=+$('vx').value,op=$('op').value,t=+$('vt').value;
    let r;switch(op){case'<':r=x<t;break;case'<=':r=x<=t;break;case'>':r=x>t;break;case'>=':r=x>=t;break;case'==':r=x===t;break;default:r=x!==t;}
    return{branch:r?'T':'F',binX:r?-10:10,text:'แทน x = '+x+' ในเงื่อนไข ( x '+op+' '+t+' )  →  '+x+' '+op+' '+t+' เป็น '+(r?'จริง':'เท็จ')+'  →  โปรแกรมทำบรรทัด cout &lt;&lt; "'+(r?'จริง':'เท็จ')+'"',cls:r?'T':'F'};
  }else{
    const mid=+$('vm').value,k=+$('vk').value;
    let b,bx,txt;
    if(mid===k){b='EQ';bx=0;txt='mid ('+mid+') == K ('+k+')  →  เจอเลขลับแล้ว! หยุดค้นหา';}
    else if(mid<k){b='LT';bx=11;txt='mid ('+mid+') < K ('+k+')  →  “ต่ำไป” เลขลับอยู่ครึ่งขวา จึงตัดครึ่งซ้ายทิ้ง';}
    else{b='GT';bx=-11;txt='mid ('+mid+') > K ('+k+')  →  “สูงไป” เลขลับอยู่ครึ่งซ้าย จึงตัดครึ่งขวาทิ้ง';}
    return{branch:b,binX:bx,text:txt,cls:b==='EQ'?'T':(b==='LT'?'T':'F')};
  }
}

// ---------- run animation ----------
function run(){
  if(anim)return;
  buildField();
  const o=evalOutcome();
  renderCode(false,null);
  ball.position.set(0,16,0);ball.rotation.set(0,0,0);
  ball.material.color.set(mode==='ifelse'?0x2f6fd6:0xf59e0b);
  setSprite(ballLabel,(mode==='ifelse'?'x = '+$('vx').value:'mid = '+$('vm').value),'#1e2740');
  bins.forEach(b=>b.base.material.emissive&&b.base.material.emissive.set(0x000000));
  $('banner').className='hud panel';$('banner').innerHTML='กำลังทดสอบ...<div class="sm">ลูกบอลกำลังตกสู่ประตูเงื่อนไข</div>';
  anim={phase:'drop',t:0,o,gate:new THREE.Vector3(0,9,0),bin:new THREE.Vector3(o.binX,2.2,0)};
}

function tick(dt){
  if(!anim)return;
  if(anim.phase==='drop'){
    anim.t+=dt/0.55;const p=Math.min(anim.t,1);
    ball.position.set(0,16+(9-16)*ease(p),0);
    if(p>=1){anim.phase='roll';anim.t=0;renderCode(true,anim.o.branch);}
  }else if(anim.phase==='roll'){
    anim.t+=dt/0.95;const p=Math.min(anim.t,1),e=ease(p);
    const a=anim.gate,b=anim.bin;
    const x=a.x+(b.x-a.x)*e,y=a.y+(b.y-a.y)*e;
    const prev=ball.position.x;ball.position.set(x,y,0);
    ball.rotation.z-=(x-prev)/1.3;
    if(p>=1){anim.phase='done';finish(anim.o);}
  }
}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function finish(o){
  const bin=bins.find(b=>Math.abs(b.x-o.binX)<0.5);
  if(bin){bin.base.material.emissive=new THREE.Color(o.cls==='T'?0x1e7a48:0x9c2b2b);bin.base.material.emissiveIntensity=.6;}
  $('banner').className='hud panel '+o.cls;
  $('banner').innerHTML=(mode==='ifelse'?'ผลของเงื่อนไข':'ผลการเทียบ')+'<div class="sm">'+o.text+'</div>';
  anim=null;
}

// ---------- controls ----------
function buildControls(){
  if(mode==='ifelse'){
    $('ctrl').innerHTML=
      '<select id="mode" onchange="setMode(this.value)"><option value="ifelse">if-else (2 ทาง)</option><option value="bs">binary search: เทียบ mid กับ K (3 ทาง)</option></select>'+
      '<span class="lab">x =</span><input id="vx" value="7">'+
      '<select id="op"><option>&lt;</option><option>&lt;=</option><option>&gt;</option><option>&gt;=</option><option>==</option><option>!=</option></select>'+
      '<input id="vt" value="10">'+
      '<button class="btn run" onclick="run()"><i data-lucide="play"></i> ปล่อยลูกบอล</button>'+
      '<button class="btn ghost" onclick="reset()"><i data-lucide="rotate-ccw"></i> รีเซ็ต</button>';
  }else{
    $('ctrl').innerHTML=
      '<select id="mode" onchange="setMode(this.value)"><option value="ifelse">if-else (2 ทาง)</option><option value="bs" selected>binary search: เทียบ mid กับ K (3 ทาง)</option></select>'+
      '<span class="lab">mid =</span><input id="vm" value="50">'+
      '<span class="lab">K (เลขลับ) =</span><input id="vk" value="73">'+
      '<button class="btn run" onclick="run()"><i data-lucide="play"></i> ปล่อยลูกบอล</button>'+
      '<button class="btn ghost" onclick="reset()"><i data-lucide="rotate-ccw"></i> รีเซ็ต</button>';
  }
  icons();
}
function setMode(m){mode=(m==='bs')?'bs':'ifelse';anim=null;buildControls();buildField();renderCode(false,null);ball.position.set(0,16,0);$('banner').className='hud panel';$('banner').innerHTML='พร้อมทดสอบเงื่อนไข<div class="sm">ตั้งค่าแล้วกด “ปล่อยลูกบอล”</div>';setSprite(ballLabel,(mode==='ifelse'?'x = '+$('vx').value:'mid = '+$('vm').value),'#1e2740');}
function reset(){anim=null;ball.position.set(0,16,0);ball.rotation.set(0,0,0);buildField();renderCode(false,null);$('banner').className='hud panel';$('banner').innerHTML='พร้อมทดสอบเงื่อนไข<div class="sm">ตั้งค่าแล้วกด “ปล่อยลูกบอล”</div>';setSprite(ballLabel,(mode==='ifelse'?'x = '+$('vx').value:'mid = '+$('vm').value),'#1e2740');}

function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);tick(dt);if(ballLabel)ballLabel.position.set(ball.position.x,ball.position.y+2.4,ball.position.z);updateCam();renderer.render(scene,camera);}

window.run=run;window.reset=reset;window.setMode=setMode;
init();buildControls();buildField();renderCode(false,null);setSprite(ballLabel,'x = '+$('vx').value,'#1e2740');icons();
</script>
</body>
</html>
